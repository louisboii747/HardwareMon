# yaml-language-server: $schema=https://codemagic.io/codemagic-schema.json

# HardwareMon macOS release pipeline.
#
# Scope: macOS only. Windows, Linux, Android, and website releases continue to
# run through the repository's existing GitHub Actions workflows.
#
# Codemagic setup required before the first build:
#   1. Add this repository as a Codemagic application and create its webhook.
#   2. Create the `macos_credentials` and `github_credentials` variable groups.
#   3. Configure the variables documented in hardwaremon_app/macos/README.md.

workflows:
  hardwaremon-macos-release:
    name: HardwareMon macOS Release
    instance_type: mac_mini_m2
    max_build_duration: 120

    # Codemagic's M2 builder matches HardwareMon's current Apple Silicon DMG.
    # Xcode is pinned to avoid an unreviewed toolchain upgrade changing release
    # signatures or bundle output. Flutter follows the repository's stable-channel
    # policy used by the other release pipelines.
    environment:
      groups:
        - github_credentials
      vars:
        APP_NAME: HardwareMon
        APP_PATH: hardwaremon_app
        APP_BUNDLE: hardwaremon_app/build/macos/Build/Products/Release/HardwareMon.app
        EXPECTED_BUNDLE_ID: com.hardwaremon.HardwareMon
        DIST_DIR: dist
      flutter: stable
      xcode: "16.4"

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/Library/Caches/pip

    # Tag webhooks create releases automatically. This same workflow remains
    # available through Codemagic's "Start new build" UI for manual test builds.
    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: "*"
          include: true
          source: true
      tag_patterns:
        - pattern: "v*"
          include: true
      cancel_previous_builds: false

    scripts:
      - name: Resolve release version and artifact names
        script: |
          #!/bin/bash
          set -euo pipefail

          if [[ -n "${CM_TAG:-}" ]]; then
            VERSION="${CM_TAG#v}"
            if [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
              BUILD_NAME="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            else
              echo "macOS release tags must begin with vMAJOR.MINOR.PATCH." >&2
              exit 1
            fi
          else
            VERSION="dev-${CM_COMMIT:0:7}"
            BUILD_NAME="0.0.0"
          fi

          {
            echo "VERSION=$VERSION"
            echo "BUILD_NAME=$BUILD_NAME"
            echo "MACOS_BUILD_NUMBER=${BUILD_NUMBER:-1}"
            echo "DMG_NAME=HardwareMon-macOS-$VERSION.dmg"
          } >> "$CM_ENV"

      - name: Select signing and notarization mode
        script: |
          #!/bin/bash
          set -euo pipefail

          # A Developer ID certificate enables real signing. Without it, the
          # same inside-out process applies an ad-hoc signature so bundle
          # integrity is still checked during manual and open-source builds.
          SIGNING_PREFERENCE=${MACOS_SIGNING_MODE:-auto}
          case "$SIGNING_PREFERENCE" in
            auto|adhoc|developer-id) ;;
            *)
              echo "MACOS_SIGNING_MODE must be auto, adhoc, or developer-id." >&2
              exit 1
              ;;
          esac
          if [[ "$SIGNING_PREFERENCE" == "developer-id" && -z "${CM_CERTIFICATE:-}" ]]; then
            echo "MACOS_SIGNING_MODE=developer-id requires CM_CERTIFICATE." >&2
            exit 1
          fi

          if [[ "$SIGNING_PREFERENCE" != "adhoc" && -n "${CM_CERTIFICATE:-}" ]]; then
            SIGNED_MODE=true
            RELEASE_MODE=developer-id
          else
            SIGNED_MODE=false
            RELEASE_MODE=unsigned-developer
            if [[ "$SIGNING_PREFERENCE" == "adhoc" ]]; then
              echo "MACOS_SIGNING_MODE=adhoc; using ad-hoc signing."
            else
              echo "::warning::CM_CERTIFICATE is not configured; using ad-hoc signing."
            fi
          fi

          # Notarization is independent and only activates when its complete
          # credential set and a Developer ID certificate are both available.
          if [[ "$SIGNED_MODE" == "true" \
                && -n "${APPLE_ID:-}" \
                && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" \
                && -n "${APPLE_TEAM_ID:-}" ]]; then
            NOTARIZE_MODE=true
            RELEASE_MODE=developer-id-notarized
          else
            NOTARIZE_MODE=false
            if [[ -n "${APPLE_ID:-}${APPLE_APP_SPECIFIC_PASSWORD:-}${APPLE_TEAM_ID:-}" ]]; then
              echo "::warning::Apple notarization credentials are incomplete or no Developer ID certificate is configured; notarization will be skipped."
            fi
          fi

          {
            echo "SIGNED_MODE=$SIGNED_MODE"
            echo "NOTARIZE_MODE=$NOTARIZE_MODE"
            echo "RELEASE_MODE=$RELEASE_MODE"
          } >> "$CM_ENV"

      - name: Enable Flutter macOS and install Dart dependencies
        working_directory: hardwaremon_app
        script: |
          #!/bin/bash
          set -euo pipefail
          flutter config --enable-macos-desktop
          flutter pub get

      - name: Build Flutter macOS application
        working_directory: hardwaremon_app
        script: |
          #!/bin/bash
          set -euo pipefail
          flutter build macos --release \
            --build-name "$BUILD_NAME" \
            --build-number "$MACOS_BUILD_NUMBER"

      - name: Build FastAPI telemetry helper with PyInstaller
        working_directory: hardwaremon_app/backend_fastapi
        script: |
          #!/bin/bash
          set -euo pipefail

          # Keep Python packages isolated from the Codemagic host image. The
          # macOS-only spec emits a nested HardwareMonBackend.app bundle.
          python3 -m venv "$CM_BUILD_DIR/.venv-macos"
          source "$CM_BUILD_DIR/.venv-macos/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller
          pyinstaller --clean --noconfirm backend_macos.spec

      - name: Embed telemetry helper in HardwareMon.app
        script: |
          #!/bin/bash
          set -euo pipefail

          HELPERS_DIRECTORY="$APP_BUNDLE/Contents/Helpers"
          BACKEND_SOURCE="$APP_PATH/backend_fastapi/dist/HardwareMonBackend.app"
          BACKEND_DESTINATION="$HELPERS_DIRECTORY/HardwareMonBackend.app"

          mkdir -p "$HELPERS_DIRECTORY"
          ditto "$BACKEND_SOURCE" "$BACKEND_DESTINATION"
          chmod 755 "$BACKEND_DESTINATION/Contents/MacOS/backend"

      - name: Install optional Developer ID certificate
        script: |
          #!/bin/bash
          set -euo pipefail

          if [[ "$SIGNED_MODE" != "true" ]]; then
            echo "Developer ID certificate is not configured; keychain setup skipped."
            echo "MACOS_SIGNING_IDENTITY=-" >> "$CM_ENV"
            exit 0
          fi

          CERTIFICATE_PATH="$CM_BUILD_DIR/developer-id-application.p12"
          printf '%s' "$CM_CERTIFICATE" | /usr/bin/base64 -D > "$CERTIFICATE_PATH"

          # `keychain` is Codemagic's supported CLI for its temporary build
          # keychain. CM_CERTIFICATE_PASSWORD may be omitted for passwordless p12.
          keychain initialize
          if [[ -n "${CM_CERTIFICATE_PASSWORD:-}" ]]; then
            keychain add-certificates \
              --certificate "$CERTIFICATE_PATH" \
              --certificate-password "$CM_CERTIFICATE_PASSWORD"
          else
            keychain add-certificates --certificate "$CERTIFICATE_PATH"
          fi

          security find-identity -v -p codesigning
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning \
            | awk -F'"' '/Developer ID Application:/ {print $2; exit}')
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "No Developer ID Application identity was imported." >&2
            exit 1
          fi
          echo "MACOS_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$CM_ENV"

      - name: Sign nested code and outer application bundle
        script: |
          #!/bin/bash
          set -euo pipefail

          chmod +x .github/scripts/macos-*.sh
          .github/scripts/macos-sign-app.sh \
            "$APP_BUNDLE" \
            "$MACOS_SIGNING_IDENTITY" \
            "$APP_PATH/macos/Runner/Release.entitlements"

      - name: Verify app structure, signatures, frameworks, and linked libraries
        script: |
          #!/bin/bash
          set -euo pipefail

          # Gatekeeper assessment becomes mandatory after notarization. Strict
          # codesign verification always runs, including for ad-hoc builds.
          .github/scripts/macos-validate-app.sh \
            "$APP_BUNDLE" \
            "$NOTARIZE_MODE"

      - name: Notarize and staple application when credentials are available
        script: |
          #!/bin/bash
          set -euo pipefail

          if [[ "$NOTARIZE_MODE" != "true" ]]; then
            echo "Notarization credentials are not complete; app notarization skipped."
            exit 0
          fi

          APP_ZIP="$CM_BUILD_DIR/HardwareMon-notarization.zip"
          ditto -c -k --keepParent "$APP_BUNDLE" "$APP_ZIP"
          xcrun notarytool submit "$APP_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP_BUNDLE"
          xcrun stapler validate "$APP_BUNDLE"
          codesign --verify --deep --strict --verbose=4 "$APP_BUNDLE"
          spctl --assess --type execute --verbose=4 "$APP_BUNDLE"

      - name: Smoke-launch packaged application
        script: |
          #!/bin/bash
          set -euo pipefail

          APP_EXECUTABLE="$APP_BUNDLE/Contents/MacOS/$APP_NAME"
          APP_LOG="$CM_BUILD_DIR/hardwaremon-launch.log"
          "$APP_EXECUTABLE" > "$APP_LOG" 2>&1 &
          APP_PID=$!

          sleep 10
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "HardwareMon exited during the launch smoke test." >&2
            cat "$APP_LOG" >&2
            wait "$APP_PID" || true
            exit 1
          fi

          BACKEND_PIDS=$(pgrep -P "$APP_PID" || true)
          if [[ -n "$BACKEND_PIDS" ]]; then
            kill $BACKEND_PIDS 2>/dev/null || true
          fi
          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" || true

      - name: Stage application and Applications shortcut
        script: |
          #!/bin/bash
          set -euo pipefail

          rm -rf "$DIST_DIR/dmg"
          mkdir -p "$DIST_DIR/dmg"
          ditto "$APP_BUNDLE" "$DIST_DIR/dmg/$APP_NAME.app"
          ln -s /Applications "$DIST_DIR/dmg/Applications"

          # Unsigned or unnotarized artifacts remain useful for testing, but the
          # mounted image tells testers exactly what Gatekeeper will require.
          if [[ "$NOTARIZE_MODE" != "true" ]]; then
            cp "$APP_PATH/macos/README.md" "$DIST_DIR/dmg/RELEASE-NOTICE.md"
          fi

          .github/scripts/macos-validate-app.sh \
            "$DIST_DIR/dmg/$APP_NAME.app" \
            "$NOTARIZE_MODE"

      - name: Build compressed DMG
        script: |
          #!/bin/bash
          set -euo pipefail

          mkdir -p "$DIST_DIR"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$DIST_DIR/dmg" \
            -ov \
            -format UDZO \
            "$DIST_DIR/$DMG_NAME"

      - name: Sign DMG when Developer ID is available
        script: |
          #!/bin/bash
          set -euo pipefail

          if [[ "$SIGNED_MODE" != "true" ]]; then
            echo "Developer ID certificate is not configured; DMG signing skipped."
            exit 0
          fi

          codesign --force --timestamp \
            --sign "$MACOS_SIGNING_IDENTITY" \
            "$DIST_DIR/$DMG_NAME"
          codesign --verify --strict --verbose=4 "$DIST_DIR/$DMG_NAME"

      - name: Notarize and staple DMG when credentials are available
        script: |
          #!/bin/bash
          set -euo pipefail

          if [[ "$NOTARIZE_MODE" != "true" ]]; then
            echo "Notarization credentials are not complete; DMG notarization skipped."
            exit 0
          fi

          xcrun notarytool submit "$DIST_DIR/$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DIST_DIR/$DMG_NAME"
          xcrun stapler validate "$DIST_DIR/$DMG_NAME"

      - name: Verify final DMG and remounted application
        script: |
          #!/bin/bash
          set -euo pipefail

          .github/scripts/macos-validate-dmg.sh \
            "$DIST_DIR/$DMG_NAME" \
            "$NOTARIZE_MODE"

      - name: Generate SHA-256 checksum
        script: |
          #!/bin/bash
          set -euo pipefail

          cd "$DIST_DIR"
          shasum -a 256 "$DMG_NAME" > "$DMG_NAME.sha256"

      - name: Upload tagged build to matching GitHub Release
        script: |
          #!/bin/bash
          set -euo pipefail

          # Manual Codemagic builds intentionally stop at downloadable build
          # artifacts. Only tag-triggered builds alter GitHub Releases.
          if [[ -z "${CM_TAG:-}" ]]; then
            echo "Manual build: GitHub Release upload skipped."
            exit 0
          fi
          if [[ -z "${GITHUB_TOKEN:-}" ]]; then
            echo "GITHUB_TOKEN is required for tagged release publishing." >&2
            exit 1
          fi

          export GH_TOKEN="$GITHUB_TOKEN"
          if ! gh release view "$CM_TAG" --repo "$CM_REPO_SLUG" >/dev/null 2>&1; then
            # Usually another platform workflow has already created the release.
            # Creating it here keeps macOS publishing robust if Codemagic wins
            # that race or the release does not yet exist.
            gh release create "$CM_TAG" \
              --repo "$CM_REPO_SLUG" \
              --verify-tag \
              --title "HardwareMon $CM_TAG" \
              --generate-notes \
              || gh release view "$CM_TAG" --repo "$CM_REPO_SLUG" >/dev/null
          fi

          gh release upload "$CM_TAG" \
            "$DIST_DIR/$DMG_NAME" \
            "$DIST_DIR/$DMG_NAME.sha256" \
            --repo "$CM_REPO_SLUG" \
            --clobber

    # Manual builds and tag builds both retain the DMG and checksum in
    # Codemagic, independently of GitHub publishing.
    artifacts:
      - dist/*.dmg
      - dist/*.sha256
