name: Build & Publish HardwareMon

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools_scm

      - run: python -m build

      - run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Set version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Install package into staging
        run: |
          mkdir -p pkg/hardwaremon
          pip install dist/*.whl --target pkg/hardwaremon --no-deps
          rm -rf pkg/hardwaremon/*.dist-info pkg/hardwaremon/*.data    



      - name: Create CLI wrapper
        run: |
          mkdir -p pkg/bin
          cat <<'EOF' > pkg/bin/hardwaremon
          #!/usr/bin/env python3
          import sys
          sys.path.insert(0, '/opt/')
          from hardwaremon.hardwaremon import main
          main()
          EOF
          chmod +x pkg/bin/hardwaremon

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update -q
          sudo apt-get install -y nfpm

      - name: Build Linux packages
        run: |
          nfpm pkg --config nfpm.yaml --target hardwaremon.deb
          nfpm pkg --config nfpm.yaml --target hardwaremon.rpm

      - name: Create GitHub Release + upload packages
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.deb
            *.rpm