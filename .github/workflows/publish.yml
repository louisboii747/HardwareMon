name: Build & Publish HardwareMon

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Linux build + repositories
  # ─────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # Node.js
      # ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ─────────────────────────────────────────────
      # Flutter
      # ─────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ─────────────────────────────────────────────
      # System dependencies
      # ─────────────────────────────────────────────
      - name: Install system tools
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            dpkg-dev \
            createrepo-c \
            curl \
            golang-go \
            apt-utils \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            zip \
            python3 \
            python3-pip \
            python3-venv

      # ─────────────────────────────────────────────
      # Python dependencies
      # ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python3 -m pip install --break-system-packages \
            psutil \
            gputil

      # ─────────────────────────────────────────────
      # Install nfpm
      # ─────────────────────────────────────────────
      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      # ─────────────────────────────────────────────
      # Clean workspace
      # ─────────────────────────────────────────────
      - name: Clean workspace
        run: rm -rf dist repo public pkg flutter-release

      # ─────────────────────────────────────────────
      # Prepare Python package
      # ─────────────────────────────────────────────
      - name: Prepare package files
        run: |
          mkdir -p pkg/opt/hardwaremon
          mkdir -p pkg/bin

          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          echo "Injecting version $VERSION"

          sed -i "s/^VERSION = .*/VERSION = \"${VERSION}\"/" hardwaremon/hardwaremon.py
          sed -i "s/^VERSION = .*/VERSION = \"${VERSION}\"/" hardwaremon/hardwaremon_gui.py

          cp hardwaremon/* pkg/opt/hardwaremon/

          # CLI launcher
          cat <<'EOF' > pkg/bin/hardwaremon
          #!/bin/bash
          exec python3 /opt/hardwaremon/hardwaremon.py "$@"
          EOF

          # GUI launcher
          cat <<'EOF' > pkg/bin/hardwaremon-gui
          #!/bin/bash
          exec python3 /opt/hardwaremon/hardwaremon_gui.py "$@"
          EOF

          chmod +x pkg/bin/*

          # Desktop entry
          mkdir -p pkg/usr/share/applications

          cat <<EOF > pkg/usr/share/applications/hardwaremon.desktop
          [Desktop Entry]
          Name=HardwareMon
          Comment=System monitoring tool
          Exec=hardwaremon-gui
          Icon=hardwaremon
          Terminal=false
          Type=Application
          Categories=System;Monitor;
          EOF

          # Icon
          mkdir -p pkg/usr/share/icons/hicolor/256x256/apps
          cp hardwaremon/cpu.png pkg/usr/share/icons/hicolor/256x256/apps/hardwaremon.png

      # ─────────────────────────────────────────────
      # Get version
      # ─────────────────────────────────────────────
      - name: Get version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────────
      # Create nfpm config
      # ─────────────────────────────────────────────
      - name: Create nfpm config
        run: |
          cat <<EOF > nfpm.yaml
          name: hardwaremon
          arch: amd64
          platform: linux
          version: "${{ steps.version.outputs.version }}"
          maintainer: Louis Hinchliffe <louishinchliffe11@gmail.com>
          description: HardwareMon system monitor
          homepage: https://github.com/louisboii747/HardwareMon

          depends:
            - python3
            - python3-tk
            - python3-pil
            - python3-psutil

          overrides:
            rpm:
              depends:
                - python3
                - python3-tkinter
                - python3-pillow
                - python3-pillow-tk
                - python3-psutil

          contents:
            - src: pkg/bin/hardwaremon
              dst: /usr/bin/hardwaremon

            - src: pkg/bin/hardwaremon-gui
              dst: /usr/bin/hardwaremon-gui

            - src: pkg/opt/hardwaremon/
              dst: /opt/hardwaremon/

            - src: pkg/usr/share/applications/hardwaremon.desktop
              dst: /usr/share/applications/hardwaremon.desktop

            - src: pkg/usr/share/icons/hicolor/256x256/apps/hardwaremon.png
              dst: /usr/share/icons/hicolor/256x256/apps/hardwaremon.png
          EOF

      # ─────────────────────────────────────────────
      # Build Linux packages
      # ─────────────────────────────────────────────
      - name: Create dist folder
        run: mkdir -p dist

      - name: Build packages
        run: |
          nfpm pkg --config nfpm.yaml --packager deb --target dist/hardwaremon.deb
          nfpm pkg --config nfpm.yaml --packager rpm --target dist/hardwaremon.rpm

      # ─────────────────────────────────────────────
      # Flutter dependencies
      # ─────────────────────────────────────────────
      - name: Install Flutter dependencies
        working-directory: flutter_gui
        run: flutter pub get

      # ─────────────────────────────────────────────
      # Build Flutter Linux app
      # ─────────────────────────────────────────────
      - name: Build Flutter Linux app
        working-directory: flutter_gui
        run: flutter build linux --release

      # ─────────────────────────────────────────────
      # Prepare Flutter release ZIP
      # ─────────────────────────────────────────────
      - name: Prepare Flutter release
        run: |
          mkdir -p flutter-release

          cp -r flutter_gui/build/linux/x64/release/bundle/* flutter-release/

          cp hardwaremon/api.py flutter-release/

          cd flutter-release

          chmod +x flutter_gui || true

          zip -r ../HardwareMon-Flutter-Linux.zip .

      # ─────────────────────────────────────────────
      # Build APT repo
      # ─────────────────────────────────────────────
      - name: Build APT repo
        run: |
          mkdir -p repo/apt/pool/main/h/hardwaremon
          mkdir -p repo/apt/dists/stable/main/binary-amd64

          cp dist/hardwaremon.deb repo/apt/pool/main/h/hardwaremon/

          cd repo/apt

          dpkg-scanpackages --multiversion pool > dists/stable/main/binary-amd64/Packages
          gzip -k dists/stable/main/binary-amd64/Packages

          cat <<EOF > apt.conf
          APT::FTPArchive::Release {
            Origin "HardwareMon";
            Label "HardwareMon";
            Suite "stable";
            Codename "stable";
            Architectures "amd64";
            Components "main";
            Description "HardwareMon APT Repository";
          };
          EOF

          apt-ftparchive -c apt.conf release dists/stable > dists/stable/Release

      # ─────────────────────────────────────────────
      # Build DNF repo
      # ─────────────────────────────────────────────
      - name: Build DNF repo
        run: |
          mkdir -p repo/yum
          cp dist/hardwaremon.rpm repo/yum/

          cd repo/yum
          createrepo_c .

      # ─────────────────────────────────────────────
      # Prepare Pages output
      # ─────────────────────────────────────────────
      - name: Prepare Pages output
        run: |
          mkdir -p public/apt public/yum

          cp -r repo/apt/* public/apt/
          cp -r repo/yum/* public/yum/

          cat <<'EOF' > public/yum/hardwaremon.repo
          [hardwaremon]
          name=HardwareMon Repository
          baseurl=https://hardwaremon.pages.dev/yum/
          enabled=1
          gpgcheck=0
          EOF

          cat <<'EOF' > public/apt/setup.sh
          #!/bin/bash
          set -e

          echo "Adding HardwareMon APT repository..."

          echo "deb [trusted=yes] https://hardwaremon.pages.dev/apt stable main" \
          | sudo tee /etc/apt/sources.list.d/hardwaremon.list > /dev/null

          sudo apt update

          echo "Done. Install with:"
          echo "  sudo apt install hardwaremon"
          EOF

          chmod +x public/apt/setup.sh

          echo '<h1>HardwareMon Repo</h1><a href="/apt/">APT</a><br><a href="/yum/">YUM</a>' > public/index.html

          echo "404" > public/404.html

      # ─────────────────────────────────────────────
      # Deploy Pages
      # ─────────────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy public --project-name=hardwaremon --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ─────────────────────────────────────────────
      # GitHub Release
      # ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/hardwaremon.deb
            dist/hardwaremon.rpm
            HardwareMon-Flutter-Linux.zip

  # ─────────────────────────────────────────────────────────────────
  # Windows build
  # ─────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install customtkinter psutil gputil pyinstaller pillow

      - name: Inject version into source
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")

          (Get-Content Windows\hardwaremon_win.py) `
            -replace '^VERSION = .*', "VERSION = `"$version`"" `
            | Set-Content Windows\hardwaremon_win.py

      - name: Build exe with PyInstaller
        shell: pwsh
        run: |
          pyinstaller Windows/HardwareMon.spec

      - name: Create Inno Setup script
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")

          @"
          [Setup]
          AppName=HardwareMon
          AppVersion=$version
          AppPublisher=Louis Hinchliffe
          DefaultDirName={autopf}\HardwareMon
          DefaultGroupName=HardwareMon
          OutputDir=installer
          OutputBaseFilename=HardwareMonSetup-$version
          Compression=lzma
          SolidCompression=yes

          [Files]
          Source: "dist\HardwareMon.exe"; DestDir: "{app}"

          [Icons]
          Name: "{group}\HardwareMon"; Filename: "{app}\HardwareMon.exe"
          "@ | Out-File -FilePath setup.iss -Encoding utf8

      - name: Build installer
        shell: pwsh
        run: |
          mkdir installer
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/HardwareMonSetup-*.exe

  # ─────────────────────────────────────────────────────────────────
  # Winget submission
  # ─────────────────────────────────────────────────────────────────
  winget:
    needs: build-windows
    runs-on: windows-latest

    steps:
      - name: Get version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v","V")
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Submit to winget
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: LouisHinchliffe.HardwareMon
          version: ${{ steps.version.outputs.version }}

          release-tag: v${{ steps.version.outputs.version }}

          installers-regex: 'HardwareMonSetup-.*\.exe$'

          architectures: x64

          release-notes: |
            Added Flutter desktop frontend.
            Improved Linux packaging workflow.
            Updated CI/CD automation.
            Bug fixes and performance improvements.

          release-notes-url: https://github.com/louisboii747/HardwareMon/releases/tag/v${{ steps.version.outputs.version }}

          token: ${{ secrets.WINGET_TOKEN }}