name: Build & Publish HardwareMon

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      # ─────────────────────────────────────────────
      # Checkout
      # ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      # ─────────────────────────────────────────────
      # Setup Flutter
      # ─────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ─────────────────────────────────────────────
      # Setup Node.js
      # ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      # ─────────────────────────────────────────────
      # Install Linux dependencies
      # ─────────────────────────────────────────────
      - name: Install Linux dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            dpkg-dev \
            apt-utils \
            createrepo-c \
            curl \
            golang-go \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            zip \
            python3 \
            python3-pip \
            upx \
            rpm \
            libnotify-dev \
            libayatana-appindicator3-dev

      # ─────────────────────────────────────────────
      # Install Python dependencies
      # ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python3 -m pip install --break-system-packages \
          fastapi \
          uvicorn \
          psutil \
          requests \
          urllib3 \
          pyinstaller

      # ─────────────────────────────────────────────
      # Install nfpm
      # ─────────────────────────────────────────────
      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      # ─────────────────────────────────────────────
      # Get version
      # ─────────────────────────────────────────────
      - name: Get version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          FLUTTER_VERSION="$(flutter --version --machine | jq -r '.frameworkVersion')"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "flutter_version=$FLUTTER_VERSION" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────────
      # GPG
      # ─────────────────────────────────────────────

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 -d > private.asc
          gpg --batch --import private.asc

          gpg --list-secret-keys

      # ─────────────────────────────────────────────
      # Flutter dependencies
      # ─────────────────────────────────────────────
      - name: Flutter pub get
        working-directory: hardwaremon_app
        run: flutter pub get

      # ─────────────────────────────────────────────
      # Build Flutter Linux app
      # ─────────────────────────────────────────────
      - name: Build Flutter Linux app
        working-directory: hardwaremon_app
        run: |
          flutter build linux --release \
            --split-debug-info=symbols \
            --build-name="${{ steps.version.outputs.version }}" \
            --dart-define=APP_VERSION="${{ steps.version.outputs.version }}" \
            --dart-define=HARDWAREMON_FLUTTER_VERSION="${{ steps.version.outputs.flutter_version }}"

      # ─────────────────────────────────────────────
      # Build FastAPI backend
      # ─────────────────────────────────────────────

      - name: Build backend binary
        run: |
          pyinstaller \
            --onefile \
            --name backend \
            hardwaremon_app/backend_fastapi/main.py

          strip dist/backend || true
          upx --best dist/backend

      # ─────────────────────────────────────────────
      # Prepare package structure
      # ─────────────────────────────────────────────
      - name: Prepare package
        run: |
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/lib/hardwaremon
          mkdir -p pkg/usr/lib/hardwaremon/backend
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/icons/hicolor/256x256/apps

          cp -r hardwaremon_app/build/linux/x64/release/bundle/* \
            pkg/usr/lib/hardwaremon/

          mv pkg/usr/lib/hardwaremon/hardwaremon \
            pkg/usr/lib/hardwaremon/hardwaremon-bin

          cp dist/backend \
          pkg/usr/lib/hardwaremon/backend/

          chmod +x \
          pkg/usr/lib/hardwaremon/backend/backend

      # ─────────────────────────────────────────────
      # Create launcher
      # ─────────────────────────────────────────────
      - name: Create launcher
        run: |
          cat <<'EOF' > pkg/usr/bin/hardwaremon
          #!/bin/bash

          APP_DIR="/usr/lib/hardwaremon"

          export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"

          cd "$APP_DIR"

          # Start backend
          "$APP_DIR/backend/backend" &
          BACKEND_PID=$!
          export HARDWAREMON_BACKEND_MANAGED=1

          # Launch Flutter app
          "$APP_DIR/hardwaremon-bin" "$@"

          # Cleanup backend after app exits
          kill $BACKEND_PID
          EOF

          chmod +x pkg/usr/bin/hardwaremon

      # ─────────────────────────────────────────────
      # Create desktop entry
      # ─────────────────────────────────────────────
      - name: Create desktop entry
        run: |
          cat <<'EOF' > pkg/usr/share/applications/com.hardwaremon.HardwareMon.desktop
          [Desktop Entry]
          Name=HardwareMon
          Comment=Modern system monitoring platform
          Exec=hardwaremon
          Icon=com.hardwaremon.HardwareMon
          Terminal=false
          Type=Application
          Categories=System;Monitor;
          StartupNotify=true
          StartupWMClass=com.hardwaremon.HardwareMon
          EOF

      # ─────────────────────────────────────────────
      # Copy icon
      # ─────────────────────────────────────────────
      - name: Copy icon
        run: |
          cp "hardwaremon_app/assets/hardwaremon.png" \
          pkg/usr/share/icons/hicolor/256x256/apps/com.hardwaremon.HardwareMon.png

      # ─────────────────────────────────────────────
      # Create nfpm config
      # ─────────────────────────────────────────────
      - name: Create nfpm config
        run: |
          cat <<EOF > nfpm.yaml
          name: hardwaremon
          arch: amd64
          platform: linux
          version: "${{ steps.version.outputs.version }}"

          maintainer: Louis Hinchliffe <louishinchliffe11@gmail.com>

          description: Modern cross-platform system monitor

          homepage: https://github.com/louisboii747/HardwareMon

          contents:
            - src: pkg/usr/bin/hardwaremon
              dst: /usr/bin/hardwaremon
              file_info:
                mode: 0755

            - src: pkg/usr/lib/hardwaremon/
              dst: /usr/lib/hardwaremon/
              type: tree

            - src: pkg/usr/share/applications/com.hardwaremon.HardwareMon.desktop
              dst: /usr/share/applications/com.hardwaremon.HardwareMon.desktop

            - src: pkg/usr/share/icons/hicolor/256x256/apps/com.hardwaremon.HardwareMon.png
              dst: /usr/share/icons/hicolor/256x256/apps/com.hardwaremon.HardwareMon.png
          EOF

      # ─────────────────────────────────────────────
      # Build packages
      # ─────────────────────────────────────────────
      - name: Create dist folder
        run: mkdir -p dist

      - name: Build DEB package
        run: |
          cp nfpm.yaml nfpm-deb.yaml
          cat <<'EOF' >> nfpm-deb.yaml
          depends:
            - libayatana-appindicator3-1
          EOF

          nfpm pkg \
            --config nfpm-deb.yaml \
            --packager deb \
            --target dist/hardwaremon.deb

      - name: Build RPM package
        run: |
          cp nfpm.yaml nfpm-rpm.yaml
          cat <<'EOF' >> nfpm-rpm.yaml
          depends:
            - libayatana-appindicator-gtk3
          EOF

          nfpm pkg \
            --config nfpm-rpm.yaml \
            --packager rpm \
            --target dist/hardwaremon.rpm

      - name: Configure RPM signing
        run: |
          cat > ~/.rpmmacros <<EOF
          %_signature gpg
          %_gpg_name ${{ secrets.GPG_KEY_ID }}
          %__gpg /usr/bin/gpg
          %_gpg_sign_cmd_extra_args --batch --yes --pinentry-mode loopback --passphrase ${{ secrets.GPG_PASSPHRASE }}
          EOF

      - name: Verify rpmsign
        run: |
          which rpmsign
          rpmsign --version

      - name: Sign RPM package
        run: |
          set -euxo pipefail

          rpmsign --addsign dist/hardwaremon.rpm

          echo "===== RPM signature check ====="
          rpm -Kv dist/hardwaremon.rpm 2>&1 | tee rpm-verify.txt || true

          grep -E "Header V[0-9]+ RSA|Header V[0-9]+ DSA|Header V[0-9]+ PGP|Signature" rpm-verify.txt

      - name: Generate Linux checksums and release metadata
        run: |
          python .github/scripts/generate-release-metadata.py \
            --output-dir dist \
            --checksums-name SHA256SUMS-linux.txt \
            --metadata-name release-metadata-linux.json \
            dist/hardwaremon.deb dist/hardwaremon.rpm

      - name: Generate Linux CycloneDX SBOM
        run: |
          python .github/scripts/generate-release-sbom.py \
            --output "dist/HardwareMon-Linux-${{ steps.version.outputs.version }}.cdx.json" \
            --version "${{ steps.version.outputs.version }}" \
            --artifact "DEB and RPM packages"

      - name: Attest Linux package provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/hardwaremon.deb
            dist/hardwaremon.rpm

      - name: Attest Linux package SBOM
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/hardwaremon.deb
            dist/hardwaremon.rpm
          sbom-path: dist/HardwareMon-Linux-${{ steps.version.outputs.version }}.cdx.json

      - name: Upload Linux release evidence
        uses: actions/upload-artifact@v7
        with:
          name: HardwareMon-Linux-${{ steps.version.outputs.version }}-release-evidence
          path: |
            dist/hardwaremon.deb
            dist/hardwaremon.rpm
            dist/SHA256SUMS-linux.txt
            dist/release-metadata-linux.json
            dist/HardwareMon-Linux-${{ steps.version.outputs.version }}.cdx.json
          if-no-files-found: error

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update

      # ─────────────────────────────────────────────
      # Upload packages
      # ─────────────────────────────────────────────

      - name: Upload packages to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp dist/hardwaremon.deb \
            s3://hardwaremon-packages/hardwaremon.deb \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

          aws s3 cp dist/hardwaremon.rpm \
            s3://hardwaremon-packages/hardwaremon.rpm \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      # ─────────────────────────────────────────────
      # Build APT repository
      # ─────────────────────────────────────────────

      - name: Build APT repository
        run: |
          mkdir -p repo/apt/pool/main/h/hardwaremon
          mkdir -p repo/apt/dists/stable/main/binary-amd64

          cp dist/hardwaremon.deb \
            repo/apt/pool/main/h/hardwaremon/

          cd repo/apt

          dpkg-scanpackages --multiversion pool \
            > dists/stable/main/binary-amd64/Packages

          gzip -k dists/stable/main/binary-amd64/Packages

          cat <<EOF > apt.conf
          APT::FTPArchive::Release {
            Origin "HardwareMon";
            Label "HardwareMon";
            Suite "stable";
            Codename "stable";
            Architectures "amd64";
            Components "main";
            Description "HardwareMon APT Repository";
          };
          EOF

          apt-ftparchive -c apt.conf release dists/stable \
            > dists/stable/Release

          gpg \
            --batch \
            --yes \
            --pinentry-mode loopback \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --default-key "${{ secrets.GPG_KEY_ID }}" \
            -abs \
            -o dists/stable/Release.gpg \
            dists/stable/Release

          gpg \
            --batch \
            --yes \
            --pinentry-mode loopback \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --default-key "${{ secrets.GPG_KEY_ID }}" \
            --clearsign \
            -o dists/stable/InRelease \
            dists/stable/Release

      # ─────────────────────────────────────────────
      # Build DNF repository
      # ─────────────────────────────────────────────
      - name: Build DNF repository
        run: |
          mkdir -p repo/yum

          cp dist/hardwaremon.rpm repo/yum/

          cd repo/yum

          createrepo_c .

          gpg \
            --batch \
            --yes \
            --pinentry-mode loopback \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --default-key "${{ secrets.GPG_KEY_ID }}" \
            --detach-sign \
            --armor \
            repodata/repomd.xml

      # ─────────────────────────────────────────────
      # Upload APT/DNF repositories to Cloudflare R2
      # ─────────────────────────────────────────────
      - name: Upload APT repository to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync repo/apt \
            s3://hardwaremon-packages/apt \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --delete

      - name: Upload DNF repository to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp repo/yum \
            s3://hardwaremon-packages/yum \
            --recursive \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - name: Upload public signing key
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp hardwaremon-public.asc \
            s3://hardwaremon-packages/hardwaremon-public.asc \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      # ─────────────────────────────────────────────
      # Prepare Cloudflare Pages output
      # ─────────────────────────────────────────────
      - name: Prepare Pages output
        run: |
          mkdir -p public/apt
          cp hardwaremon-public.asc public/
          cp -r repo/apt/* public/apt/


          # Homepage
          cat <<'EOF' > public/index.html
          <h1>HardwareMon Repository</h1>

          <a href="/apt/">APT Repository</a>
          EOF

          echo "404" > public/404.html

      # ─────────────────────────────────────────────
      # Create GitHub Release
      # ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

          files: |
            dist/hardwaremon.deb
            dist/hardwaremon.rpm
            dist/SHA256SUMS-linux.txt
            dist/release-metadata-linux.json
            dist/HardwareMon-Linux-${{ steps.version.outputs.version }}.cdx.json
