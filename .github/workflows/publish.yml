name: Build & Publish HardwareMon

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools_scm

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev createrepo-c curl golang-go

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Clean workspace
        run: |
          rm -rf dist build *.egg-info repo public pkg

      - name: Build Python package
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ github.ref_name }}
        run: python -m build

      - name: Create CLI wrappers
        run: |
          mkdir -p pkg/bin

          echo "#!/usr/bin/env python3" > pkg/bin/hardwaremon
          echo "from hardwaremon.hardwaremon import main" >> pkg/bin/hardwaremon
          echo "" >> pkg/bin/hardwaremon
          echo "if __name__ == '__main__':" >> pkg/bin/hardwaremon
          echo "    main()" >> pkg/bin/hardwaremon

          echo "#!/usr/bin/env python3" > pkg/bin/hardwaremon-gui
          echo "from hardwaremon.hardwaremon_gui import gui" >> pkg/bin/hardwaremon-gui
          echo "" >> pkg/bin/hardwaremon-gui
          echo "if __name__ == '__main__':" >> pkg/bin/hardwaremon-gui
          echo "    gui()" >> pkg/bin/hardwaremon-gui

          chmod +x pkg/bin/hardwaremon
          chmod +x pkg/bin/hardwaremon-gui

      - name: Create nfpm config
        run: |
          rm -f nfpm.yaml

          echo "name: hardwaremon" >> nfpm.yaml
          echo "arch: amd64" >> nfpm.yaml
          echo "platform: linux" >> nfpm.yaml
          echo "version: 1.0.0" >> nfpm.yaml
          echo "maintainer: you <you@example.com>" >> nfpm.yaml
          echo "description: HardwareMon system monitor" >> nfpm.yaml
          echo "homepage: https://github.com/louisboii747/HardwareMon" >> nfpm.yaml

          echo "contents:" >> nfpm.yaml
          echo "  - src: pkg/bin/hardwaremon" >> nfpm.yaml
          echo "    dst: /usr/bin/hardwaremon" >> nfpm.yaml
          echo "  - src: pkg/bin/hardwaremon-gui" >> nfpm.yaml
          echo "    dst: /usr/bin/hardwaremon-gui" >> nfpm.yaml

          echo "=== NFPM CONFIG ==="
          cat nfpm.yaml

      - name: Build packages
        run: |
          nfpm pkg --config nfpm.yaml --packager deb --target dist/hardwaremon.deb
          nfpm pkg --config nfpm.yaml --packager rpm --target dist/hardwaremon.rpm

          echo "=== DIST CONTENTS ==="
          ls -lah dist

      - name: Build APT repo
        run: |
          # Create full structure FIRST
          mkdir -p repo/apt/pool/main/h/hardwaremon
          mkdir -p repo/apt/dists/stable/main/binary-amd64

          # Copy package
          cp dist/hardwaremon.deb repo/apt/pool/main/h/hardwaremon/

          cd repo/apt

          # Generate package lists (BOTH files)
          dpkg-scanpackages pool /dev/null > dists/stable/main/binary-amd64/Packages
          gzip -k dists/stable/main/binary-amd64/Packages

          # Create Release file in CORRECT location
          cd dists/stable

          echo "Origin: HardwareMon" > Release
          echo "Label: HardwareMon" >> Release
          echo "Suite: stable" >> Release
          echo "Codename: stable" >> Release
          echo "Architectures: amd64" >> Release
          echo "Components: main" >> Release
          echo "Description: HardwareMon APT Repository" >> Release

      - name: Build DNF repo
        run: |
          mkdir -p repo/yum
          cp dist/hardwaremon.rpm repo/yum/

          cd repo/yum
          createrepo_c .

          echo "[hardwaremon]" > hardwaremon.repo
          echo "name=HardwareMon Repo" >> hardwaremon.repo
          echo "baseurl=https://hardwaremon.pages.dev/yum" >> hardwaremon.repo
          echo "enabled=1" >> hardwaremon.repo
          echo "gpgcheck=0" >> hardwaremon.repo

      - name: Prepare Pages output
        run: |
          rm -rf public
          mkdir -p public/apt public/yum

          cp -r repo/apt/* public/apt/
          cp -r repo/yum/* public/yum/

          echo '<!doctype html>' > public/index.html
          echo '<html><body>' >> public/index.html
          echo '<h1>HardwareMon Repository</h1>' >> public/index.html
          echo '<p><a href="/apt/">APT</a></p>' >> public/index.html
          echo '<p><a href="/yum/">YUM</a></p>' >> public/index.html
          echo '</body></html>' >> public/index.html


      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy public --project-name=hardwaremon --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      
      - name: DEBUG final public
        run: |
          echo "=== FINAL PUBLIC STRUCTURE ==="
          find public -type f

      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hardwaremon.deb
            dist/hardwaremon.rpm