name: Build & Publish HardwareMon

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools_scm

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev createrepo-c curl golang-go

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Clean workspace
        run: |
          rm -rf dist build *.egg-info repo public pkg

      - name: Build Python package
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ github.ref_name }}
        run: python -m build

      # -------------------------
      # CLI WRAPPERS (FIXED)
      # -------------------------
      - name: Create CLI wrappers
        run: |
          mkdir -p pkg/bin

          printf '%s\n' \
'#!/usr/bin/env python3' \
'from hardwaremon.hardwaremon import main' \
'' \
'if __name__ == "__main__":' \
'    main()' > pkg/bin/hardwaremon

          printf '%s\n' \
'#!/usr/bin/env python3' \
'from hardwaremon.hardwaremon_gui import gui' \
'' \
'if __name__ == "__main__":' \
'    gui()' > pkg/bin/hardwaremon-gui

          chmod +x pkg/bin/hardwaremon
          chmod +x pkg/bin/hardwaremon-gui

      - name: Build packages
        run: |
          nfpm pkg --config nfpm.yaml --target hardwaremon.deb
          nfpm pkg --config nfpm.yaml --target hardwaremon.rpm

      # -------------------------
      # APT REPO (FIXED)
      # -------------------------
      - name: Build APT repo
        run: |
          mkdir -p repo/apt
          cp hardwaremon.deb repo/apt/

          cd repo/apt
          dpkg-scanpackages . /dev/null | gzip -9c > Packages.gz

          printf '%s\n' \
'Origin: HardwareMon' \
'Label: HardwareMon' \
'Suite: stable' \
'Codename: stable' \
'Architectures: amd64' \
'Components: main' \
'Description: HardwareMon APT Repository' > Release

      # -------------------------
      # YUM REPO
      # -------------------------
      - name: Build YUM repo
        run: |
          mkdir -p repo/yum
          cp hardwaremon.rpm repo/yum/

          cd repo/yum
          createrepo_c .

          printf '%s\n' \
'[hardwaremon]' \
'name=HardwareMon Repo' \
'baseurl=https://hardwaremon.pages.dev/yum' \
'enabled=1' \
'gpgcheck=0' > hardwaremon.repo

      # -------------------------
      # PAGES OUTPUT
      # -------------------------
      - name: Prepare Pages output
        run: |
          rm -rf public
          mkdir -p public/apt public/yum

          cp -r repo/* public/

          printf '%s\n' \
'<!doctype html>' \
'<html>' \
'<head><meta charset="utf-8"><title>HardwareMon Repo</title></head>' \
'<body>' \
'<h1>HardwareMon Repository</h1>' \
'<p><a href="/apt/">APT Repository</a></p>' \
'<p><a href="/yum/">YUM Repository</a></p>' \
'</body>' \
'</html>' > public/index.html

          printf '%s\n' \
'<h1>APT Repo</h1><p>Linux package repository</p>' > public/apt/index.html

          printf '%s\n' \
'<h1>YUM Repo</h1><p>Linux package repository</p>' > public/yum/index.html

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hardwaremon.deb
            hardwaremon.rpm