name: Build & Publish HardwareMon

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────────────────────────
  # Linux build + repositories
  # ─────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # ─────────────────────────────────────────────
      # Checkout
      # ─────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # Node.js
      # ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ─────────────────────────────────────────────
      # Flutter
      # ─────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ─────────────────────────────────────────────
      # Install Linux dependencies
      # ─────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            dpkg-dev \
            apt-utils \
            createrepo-c \
            curl \
            golang-go \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            zip \
            python3 \
            python3-pip \
            upx
      # ─────────────────────────────────────────────
      # Python dependencies
      # ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python3 -m pip install --break-system-packages \
            flask \
            flask-cors \
            psutil \
            gputil \
            setuptools \
            pyinstaller

      # ─────────────────────────────────────────────
      # Install nfpm
      # ─────────────────────────────────────────────
      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      # ─────────────────────────────────────────────
      # Clean workspace
      # ─────────────────────────────────────────────
      - name: Clean workspace
        run: |
          rm -rf dist repo public pkg flutter-pkg

      # ─────────────────────────────────────────────
      # Get version
      # ─────────────────────────────────────────────
      - name: Get version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────────
      # Prepare Tkinter package files
      # ─────────────────────────────────────────────
      - name: Prepare package files
        run: |
          mkdir -p pkg/opt/hardwaremon
          mkdir -p pkg/bin

          VERSION="${{ steps.version.outputs.version }}"

          echo "Injecting version $VERSION"

          sed -i "s/^VERSION = .*/VERSION = \"${VERSION}\"/" hardwaremon/hardwaremon.py
          sed -i "s/^VERSION = .*/VERSION = \"${VERSION}\"/" hardwaremon/hardwaremon_gui.py

          cp hardwaremon/* pkg/opt/hardwaremon/

          # CLI launcher
          cat <<'EOF' > pkg/bin/hardwaremon
          #!/bin/bash
          exec python3 /opt/hardwaremon/hardwaremon.py "$@"
          EOF

          # GUI launcher
          cat <<'EOF' > pkg/bin/hardwaremon-gui
          #!/bin/bash
          exec python3 /opt/hardwaremon/hardwaremon_gui.py "$@"
          EOF

          chmod +x pkg/bin/hardwaremon
          chmod +x pkg/bin/hardwaremon-gui

          # Desktop entry
          mkdir -p pkg/usr/share/applications

          cat <<'EOF' > pkg/usr/share/applications/hardwaremon.desktop
          [Desktop Entry]
          Name=HardwareMon
          Comment=System monitoring tool
          Exec=hardwaremon-gui
          Icon=hardwaremon
          Terminal=false
          Type=Application
          Categories=System;Monitor;
          EOF

          # Icons
          mkdir -p pkg/usr/share/icons/hicolor/256x256/apps

          cp hardwaremon/Logo.png \
            pkg/usr/share/icons/hicolor/256x256/apps/hardwaremon.png

      # ─────────────────────────────────────────────
      # Create Tkinter nfpm config
      # ─────────────────────────────────────────────
      - name: Create nfpm config
        run: |
          cat <<EOF > nfpm.yaml
          name: hardwaremon
          arch: amd64
          platform: linux
          version: "${{ steps.version.outputs.version }}"

          maintainer: Louis Hinchliffe <louishinchliffe11@gmail.com>

          description: HardwareMon system monitor

          homepage: https://github.com/louisboii747/HardwareMon

          depends:
            - python3
            - python3-tk
            - python3-pil
            - python3-psutil

          overrides:
            rpm:
              depends:
                - python3
                - python3-tkinter
                - python3-pillow
                - python3-pillow-tk
                - python3-psutil

          contents:
            - src: pkg/bin/hardwaremon
              dst: /usr/bin/hardwaremon

            - src: pkg/bin/hardwaremon-gui
              dst: /usr/bin/hardwaremon-gui

            - src: pkg/opt/hardwaremon/
              dst: /opt/hardwaremon/

            - src: pkg/usr/share/applications/hardwaremon.desktop
              dst: /usr/share/applications/hardwaremon.desktop

            - src: pkg/usr/share/icons/hicolor/256x256/apps/hardwaremon.png
              dst: /usr/share/icons/hicolor/256x256/apps/hardwaremon.png
          EOF

      # ─────────────────────────────────────────────
      # Build Tkinter packages
      # ─────────────────────────────────────────────
      - name: Create dist folder
        run: mkdir -p dist

      - name: Build DEB package
        run: |
          nfpm pkg \
            --config nfpm.yaml \
            --packager deb \
            --target dist/hardwaremon.deb

      - name: Build RPM package
        run: |
          nfpm pkg \
            --config nfpm.yaml \
            --packager rpm \
            --target dist/hardwaremon.rpm

      # ─────────────────────────────────────────────
      # Flutter dependencies
      # ─────────────────────────────────────────────
      - name: Install Flutter dependencies
        working-directory: flutter_gui
        run: flutter pub get

      # ─────────────────────────────────────────────
      # Build Flutter Linux app
      # ─────────────────────────────────────────────
      - name: Build Flutter Linux app
        working-directory: flutter_gui
        run: |
          flutter build linux --release \
          --split-debug-info=symbols \
          --dart-define=APP_VERSION="${{ steps.version.outputs.version }}"


      # ─────────────────────────────────────────────
      # Prepare Flutter package
      # ─────────────────────────────────────────────
      - name: Prepare Flutter package
        run: |
          mkdir -p flutter-pkg/usr/bin
          mkdir -p flutter-pkg/usr/lib/hardwaremon-flutter
          mkdir -p flutter-pkg/usr/share/applications
          mkdir -p flutter-pkg/usr/share/icons/hicolor/256x256/apps

      - name: Copy Flutter files
        run: |
          cp -r flutter_gui/build/linux/x64/release/bundle/* \
            flutter-pkg/usr/lib/hardwaremon-flutter/

          mv flutter-pkg/usr/lib/hardwaremon-flutter/hardwaremon \
          flutter-pkg/usr/lib/hardwaremon-flutter/hardwaremon-flutter

          mkdir -p flutter-pkg/usr/lib/hardwaremon-flutter/backend

          find flutter-pkg/usr/lib/hardwaremon-flutter \
            -name "*.debug" -delete

          find flutter-pkg/usr/lib/hardwaremon-flutter \
            -name "*.a" -delete

          cd hardwaremon

          pyinstaller \
          --onefile \
          --name api \
          --hidden-import sqlite3 \
          --hidden-import database \
          --add-data "database.py:." \
          api.py

          strip dist/api || true
          upx --best dist/api

          cd ..

          # Copy backend binary
          cp hardwaremon/dist/api \
            flutter-pkg/usr/lib/hardwaremon-flutter/backend/

          chmod +x \
            flutter-pkg/usr/lib/hardwaremon-flutter/backend/api


      - name: Create Flutter launcher
        run: |
          cat <<'EOF' > flutter-pkg/usr/bin/hardwaremon-flutter
          #!/bin/bash

          #!/bin/bash

          APP_DIR="/usr/lib/hardwaremon-flutter"

          cd "$APP_DIR"

          "$APP_DIR/hardwaremon-flutter"
          EOF

          chmod +x flutter-pkg/usr/bin/hardwaremon-flutter

          
      - name: Create Flutter desktop entry
        run: |
          cat <<'EOF' > flutter-pkg/usr/share/applications/hardwaremon-flutter.desktop
          [Desktop Entry]
          Name=HardwareMon Flutter
          Comment=Flutter version of HardwareMon
          Exec=hardwaremon-flutter
          Icon=hardwaremon-flutter
          Terminal=false
          Type=Application
          Categories=System;Monitor;
          EOF

      - name: Copy Flutter icon
        run: |
          cp hardwaremon/Logo.png \
            flutter-pkg/usr/share/icons/hicolor/256x256/apps/hardwaremon-flutter.png

      # ─────────────────────────────────────────────
      # Create Flutter nfpm config
      # ─────────────────────────────────────────────
      - name: Create Flutter nfpm config
        run: |
          cat <<EOF > flutter-nfpm.yaml
          name: hardwaremon-flutter
          arch: amd64
          platform: linux
          version: "${{ steps.version.outputs.version }}"

          maintainer: Louis Hinchliffe <louishinchliffe11@gmail.com>

          description: Flutter edition of HardwareMon

          homepage: https://github.com/louisboii747/HardwareMon

          contents:
            - src: flutter-pkg/usr/bin/hardwaremon-flutter
              dst: /usr/bin/hardwaremon-flutter

            - src: flutter-pkg/usr/lib/hardwaremon-flutter/
              dst: /usr/lib/hardwaremon-flutter/
              type: tree

            - src: flutter-pkg/usr/share/applications/hardwaremon-flutter.desktop
              dst: /usr/share/applications/hardwaremon-flutter.desktop

            - src: flutter-pkg/usr/share/icons/hicolor/256x256/apps/hardwaremon-flutter.png
              dst: /usr/share/icons/hicolor/256x256/apps/hardwaremon-flutter.png
          EOF

      # ─────────────────────────────────────────────
      # Build Flutter packages
      # ─────────────────────────────────────────────
      - name: Build Flutter DEB
        run: |
          nfpm pkg \
            --config flutter-nfpm.yaml \
            --packager deb \
            --target dist/hardwaremon-flutter.deb

      - name: Build Flutter RPM
        run: |
          nfpm pkg \
            --config flutter-nfpm.yaml \
            --packager rpm \
            --target dist/hardwaremon-flutter.rpm

      # ─────────────────────────────────────────────
      # Build APT repository
      # ─────────────────────────────────────────────
      - name: Build APT repo
        run: |
          mkdir -p repo/apt/pool/main/h/hardwaremon
          mkdir -p repo/apt/dists/stable/main/binary-amd64

          cp dist/hardwaremon.deb \
            repo/apt/pool/main/h/hardwaremon/


          cd repo/apt

          dpkg-scanpackages --multiversion pool \
            > dists/stable/main/binary-amd64/Packages

          gzip -k dists/stable/main/binary-amd64/Packages

          cat <<EOF > apt.conf
          APT::FTPArchive::Release {
            Origin "HardwareMon";
            Label "HardwareMon";
            Suite "stable";
            Codename "stable";
            Architectures "amd64";
            Components "main";
            Description "HardwareMon APT Repository";
          };
          EOF

          apt-ftparchive -c apt.conf release dists/stable \
            > dists/stable/Release

      # ─────────────────────────────────────────────
      # Build DNF repository
      # ─────────────────────────────────────────────
      - name: Build DNF repo
        run: |
          mkdir -p repo/yum

          cp dist/hardwaremon.rpm repo/yum/
          cp dist/hardwaremon-flutter.rpm repo/yum/

          cd repo/yum

          createrepo_c .

      # ─────────────────────────────────────────────
      # Prepare Cloudflare Pages
      # ─────────────────────────────────────────────

      - name: Remove large files from Cloudflare Pages upload
        run: |
          rm -f repo/yum/*.rpm
          rm -f repo/apt/pool/main/h/hardwaremon/hardwaremon-flutter.deb
      
      
      - name: Prepare Pages output
        run: |
          mkdir -p public/apt
          mkdir -p public/yum

          cp -r repo/apt/* public/apt/

          mkdir -p public/yum/repodata
          cp -r repo/yum/repodata/* public/yum/repodata/
        
          # DNF repo file
          cat <<'EOF' > public/yum/hardwaremon.repo
          [hardwaremon]
          name=HardwareMon Repository
          baseurl=https://hardwaremon.pages.dev/yum/
          enabled=1
          gpgcheck=0
          EOF
          
          cat <<'EOF' > public/yum/install.sh
          #!/bin/bash
          set -e

          LATEST=$(curl -s https://api.github.com/repos/louisboii747/HardwareMon/releases/latest \
          | grep browser_download_url \
          | grep hardwaremon-flutter.rpm \
          | cut -d '"' -f 4)

          echo "Installing HardwareMon Flutter..."

          sudo dnf install -y "$LATEST"
          EOF

          chmod +x public/yum/install.sh


          # Flutter install script
          cat <<'EOF' > public/apt/flutter.sh
          #!/bin/bash
          set -e

          LATEST=$(curl -s https://api.github.com/repos/louisboii747/HardwareMon/releases/latest \
          | grep browser_download_url \
          | grep hardwaremon-flutter.deb \
          | cut -d '"' -f 4)

          echo "Installing HardwareMon Flutter..."

          TMP_DEB="/tmp/hardwaremon-flutter.deb"

          curl -L "$LATEST" -o "$TMP_DEB"

          sudo apt install -y "$TMP_DEB"

          rm -f "$TMP_DEB"
          EOF

          chmod +x public/apt/flutter.sh

          # APT setup script
          cat <<'EOF' > public/apt/setup.sh
          #!/bin/bash
          set -e

          echo "Adding HardwareMon repository..."

          echo "deb [trusted=yes] https://hardwaremon.pages.dev/apt stable main" \
          | sudo tee /etc/apt/sources.list.d/hardwaremon.list > /dev/null

          sudo apt update

          echo ""
          echo "Tkinter version:"
          echo "sudo apt install hardwaremon"

          echo ""
          echo "Flutter version:"
          echo "curl -fsSL https://hardwaremon.pages.dev/apt/flutter.sh | bash"
          EOF

          chmod +x public/apt/setup.sh

          # Homepage
          cat <<'EOF' > public/index.html
          <h1>HardwareMon Repository</h1>

          <a href="/apt/">APT Repository</a>
          <br>
          <a href="/yum/">YUM Repository</a>
          EOF

          echo "404" > public/404.html

      # ─────────────────────────────────────────────
      # Deploy Cloudflare Pages
      # ─────────────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy public \
            --project-name=hardwaremon \
            --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ─────────────────────────────────────────────
      # GitHub Release
      # ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

          files: |
            dist/hardwaremon.deb
            dist/hardwaremon.rpm
            dist/hardwaremon-flutter.deb
            dist/hardwaremon-flutter.rpm

      # ─────────────────────────────────────────────────────────────────
      # Windows build
      # ─────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      # ─────────────────────────────────────────────
      # Checkout
      # ─────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # Python
      # ─────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ─────────────────────────────────────────────
      # Dependencies
      # ─────────────────────────────────────────────
      - name: Install dependencies
        run: pip install customtkinter psutil gputil pyinstaller pillow

      # ─────────────────────────────────────────────
      # Inject version
      # ─────────────────────────────────────────────
      - name: Inject version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")

          (Get-Content Windows\hardwaremon_win.py) `
            -replace '^VERSION = .*', "VERSION = `"$version`"" `
            | Set-Content Windows\hardwaremon_win.py

      # ─────────────────────────────────────────────
      # Build EXE
      # ─────────────────────────────────────────────
      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller Windows/HardwareMon.spec

      # ─────────────────────────────────────────────
      # Create installer script
      # ─────────────────────────────────────────────
      - name: Create Inno Setup script
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")

          @"
          [Setup]
          AppName=HardwareMon
          AppVersion=$version
          AppPublisher=Louis Hinchliffe
          
          DefaultDirName={autopf}\HardwareMon
          DefaultGroupName=HardwareMon

          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible

          WizardStyle=modern
          PrivilegesRequired=admin
          SetupLogging=yes

          OutputDir=.
          OutputBaseFilename=HardwareMonSetup-x64-$version

          Compression=lzma
          SolidCompression=yes

          [Files]
          Source: "dist\HardwareMon.exe"; DestDir: "{app}"

          [Icons]
          Name: "{group}\HardwareMon"; Filename: "{app}\HardwareMon.exe"
          "@ | Out-File -FilePath setup.iss -Encoding utf8

      # ─────────────────────────────────────────────
      # Build installer
      # ─────────────────────────────────────────────
      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      # ─────────────────────────────────────────────
      # Upload installer to release
      # ─────────────────────────────────────────────
      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HardwareMonSetup-x64-*.exe

  # ─────────────────────────────────────────────────────────────────
  # Winget submission
  # ─────────────────────────────────────────────────────────────────
  winget:
    needs:
      - build-windows
      - build

    runs-on: windows-latest

    steps:
      - name: Get version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v","V")

          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Submit to winget
        uses: vedantmgoyal9/winget-releaser@v2

        with:
          identifier: LouisHinchliffe.HardwareMon

          version: ${{ steps.version.outputs.version }}

          release-tag: v${{ steps.version.outputs.version }}

          installers-regex: 'HardwareMonSetup-x64-([0-9.]+)\.exe$'


          token: ${{ secrets.WINGET_TOKEN }}

  # ─────────────────────────────────────────────────────────────────
  # AUR submission/update
  # ─────────────────────────────────────────────────────────────────

  aur-update:
    needs:
      - build

    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm \
            git \
            openssh \
            base-devel

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

          touch ~/.ssh/known_hosts
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            StrictHostKeyChecking yes
          EOF

          chmod 600 ~/.ssh/config

      - name: Debug SSH
        run: |
          ssh -T aur@aur.archlinux.org || true

      - name: Clone AUR repo
        run: |
          git clone ssh://aur@aur.archlinux.org/hardwaremon-bin.git aur

      - name: Update PKGBUILD and SRCINFO
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          cd aur

          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          makepkg --printsrcinfo > .SRCINFO

      - name: Commit and push
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          cd aur

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add PKGBUILD .SRCINFO

          git commit -m "Update to v${VERSION}" || exit 0

          git push