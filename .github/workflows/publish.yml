name: Build & Publish HardwareMon

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # Python setup
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools_scm

      # -------------------------
      # Clean
      # -------------------------
      - name: Clean workspace
        run: rm -rf dist build *.egg-info repo

      # -------------------------
      # Build Python package
      # -------------------------
      - name: Build Python package
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ github.ref_name }}
        run: python -m build

      # -------------------------
      # PyPI upload
      # -------------------------
      - name: Upload to PyPI
        run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      # -------------------------
      # Install staging package
      # -------------------------
      - name: Install package into staging
        run: |
          mkdir -p pkg/hardwaremon
          pip install dist/*.whl --target pkg/hardwaremon --no-deps
          rm -rf pkg/hardwaremon/*.dist-info pkg/hardwaremon/*.data

      # -------------------------
      # CLI WRAPPERS
      # -------------------------
      - name: Create CLI wrapper
        run: |
          mkdir -p pkg/bin

          echo '#!/usr/bin/env python3' > pkg/bin/hardwaremon
          echo 'import sys' >> pkg/bin/hardwaremon
          echo "sys.path.insert(0, '/opt/')" >> pkg/bin/hardwaremon
          echo 'from hardwaremon.hardwaremon import main' >> pkg/bin/hardwaremon
          echo 'main()' >> pkg/bin/hardwaremon
          chmod +x pkg/bin/hardwaremon

          echo '#!/usr/bin/env python3' > pkg/bin/hardwaremon-gui
          echo 'import sys' >> pkg/bin/hardwaremon-gui
          echo "sys.path.insert(0, '/opt/')" >> pkg/bin/hardwaremon-gui
          echo 'from hardwaremon.hardwaremon_gui import gui' >> pkg/bin/hardwaremon-gui
          echo 'gui()' >> pkg/bin/hardwaremon-gui
          chmod +x pkg/bin/hardwaremon-gui

      # -------------------------
      # Install repo tools (APT + YUM metadata)
      # -------------------------
      - name: Install repo tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev createrepo-c curl

      # -------------------------
      # Install nfpm
      # -------------------------
      - name: Install nfpm
        run: |
          set -e

          VERSION=$(curl -s https://api.github.com/repos/goreleaser/nfpm/releases/latest \
            | grep '"tag_name"' \
            | cut -d '"' -f4)

          echo "Using nfpm version: $VERSION"

          URL="https://github.com/goreleaser/nfpm/releases/download/${VERSION}/nfpm_${VERSION#v}_linux_amd64.deb"

          curl -L --fail -o nfpm.deb "$URL"

          ls -lah nfpm.deb
          file nfpm.deb

          sudo dpkg -i nfpm.deb

          nfpm version

      # -------------------------
      # Build DEB + RPM
      # -------------------------
      - name: Build packages
        run: |
          nfpm pkg --config nfpm.yaml --target hardwaremon.deb
          nfpm pkg --config nfpm.yaml --target hardwaremon.rpm

          ls -lah *.deb *.rpm

      # -------------------------
      # Build APT repo
      # -------------------------
      - name: Build APT repo
        run: |
          mkdir -p repo/apt
          cp hardwaremon.deb repo/apt/

          cd repo/apt
          dpkg-scanpackages . /dev/null | gzip -9c > Packages.gz
          cd ../..

      # -------------------------
      # Build YUM repo
      # -------------------------
      - name: Build YUM repo
        run: |
          mkdir -p repo/yum
          cp hardwaremon.rpm repo/yum/

          cd repo/yum
          createrepo_c .
          cd ../..

      # -------------------------
      # Verify
      # -------------------------
      - name: Verify repos
        run: |
          echo "APT:"
          ls -lah repo/apt

          echo "YUM:"
          ls -lah repo/yum

      # -------------------------
      # Upload APT repo (Nexus RAW)
      # -------------------------
      - name: Upload APT repo
        run: |
          cd repo/apt

          curl -v --fail-with-body \
            -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
            --upload-file hardwaremon.deb \
            ${{ secrets.NEXUS_URL }}/repository/hardwaremon-deb/

          curl -v --fail-with-body \
            -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
            --upload-file Packages.gz \
            ${{ secrets.NEXUS_URL }}/repository/hardwaremon-deb/

      # -------------------------
      # Upload YUM repo (Nexus RAW)
      # -------------------------
      - name: Upload YUM repo
        run: |
          cd repo/yum

          curl -v --fail-with-body \
            -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
            --upload-file hardwaremon.rpm \
            ${{ secrets.NEXUS_URL }}/repository/hardwaremon-yum/

          curl -v --fail-with-body \
            -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
            --upload-file repodata/repomd.xml \
            ${{ secrets.NEXUS_URL }}/repository/hardwaremon-yum/

      # -------------------------
      # GitHub Release
      # -------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.deb
            *.rpm