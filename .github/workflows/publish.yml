name: Build & Publish HardwareMon

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------
      # Python setup
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools_scm

      # -------------------------
      # Clean workspace
      # -------------------------
      - name: Clean workspace
        run: rm -rf dist build *.egg-info repo public

      # -------------------------
      # Build Python package
      # -------------------------
      - name: Build Python package
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ github.ref_name }}
        run: python -m build

      # -------------------------
      # Install repo tools
      # -------------------------
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev createrepo-c curl golang-go

      # -------------------------
      # Install nfpm
      # -------------------------
      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      # -------------------------
      # Build .deb and .rpm
      # -------------------------
      - name: Build packages
        run: |
          nfpm pkg --config nfpm.yaml --target hardwaremon.deb
          nfpm pkg --config nfpm.yaml --target hardwaremon.rpm

      # -------------------------
      # Create APT repo
      # -------------------------
      - name: Build APT repo
        run: |
          mkdir -p repo/apt
          cp hardwaremon.deb repo/apt/

          cd repo/apt
          dpkg-scanpackages . /dev/null | gzip -9c > Packages.gz

      # -------------------------
      # Create YUM repo
      # -------------------------
      - name: Build YUM repo
        run: |
          mkdir -p repo/yum
          cp hardwaremon.rpm repo/yum/

          cd repo/yum
          createrepo_c .

      # -------------------------
      # Prepare static output for Pages
      # -------------------------
      - name: Prepare deploy directory
        run: |
          rm -rf public
          mkdir -p public

          cp -r repo/* public/

          # Optional: redirect homepage → apt repo
          echo '<meta http-equiv="refresh" content="0; url=/apt/">' > public/index.html

      # -------------------------
      # Upload GitHub Release artifacts
      # -------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hardwaremon.deb
            hardwaremon.rpm

      # -------------------------
      # Deploy to GitHub Pages
      # -------------------------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public