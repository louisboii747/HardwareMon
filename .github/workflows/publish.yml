name: Build & Publish HardwareMon

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools_scm
          sudo apt-get update
          sudo apt-get install -y dpkg-dev createrepo-c curl golang-go apt-utils

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Clean workspace
        run: rm -rf dist build *.egg-info repo public pkg

      - name: Build Python package
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ github.ref_name }}
        run: python -m build

      - name: Install package into staging dir
        run: |
          mkdir -p pkg/root
          pip install . --root=pkg/root --prefix=/usr

      - name: Create CLI wrappers
        run: |
          mkdir -p pkg/bin

          echo "#!/usr/bin/env python3" > pkg/bin/hardwaremon
          echo "from hardwaremon.hardwaremon import main" >> pkg/bin/hardwaremon
          echo "if __name__ == '__main__': main()" >> pkg/bin/hardwaremon

          echo "#!/usr/bin/env python3" > pkg/bin/hardwaremon-gui
          echo "from hardwaremon.hardwaremon_gui import gui" >> pkg/bin/hardwaremon-gui
          echo "if __name__ == '__main__': gui()" >> pkg/bin/hardwaremon-gui

          chmod +x pkg/bin/*

      - name: Get version
        id: version
        run: |
          # Strip leading 'v' from tag (e.g. v1.2.3 -> 1.2.3)
          VERSION="${{ github.ref_name }}"
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Create nfpm config
        run: |
          cat <<EOF > nfpm.yaml
          name: hardwaremon
          arch: amd64
          platform: linux
          version: "${{ steps.version.outputs.version }}"
          maintainer: Louis Hinchliffe <louishinchliffe11@gmail.com>
          description: HardwareMon system monitor
          homepage: https://github.com/louisboii747/HardwareMon

          contents:
            - src: pkg/bin/hardwaremon
              dst: /usr/bin/hardwaremon

            - src: pkg/bin/hardwaremon-gui
              dst: /usr/bin/hardwaremon-gui

            - src: pkg/root/usr/
              dst: /usr/
          EOF

      - name: Build packages
        run: |
          nfpm pkg --config nfpm.yaml --packager deb --target dist/hardwaremon.deb
          nfpm pkg --config nfpm.yaml --packager rpm --target dist/hardwaremon.rpm

      - name: DEBUG package contents
        run: |
          echo "=== DEB CONTENTS ==="
          dpkg-deb -c dist/hardwaremon.deb

      - name: Build APT repo
        run: |
          mkdir -p repo/apt/pool/main/h/hardwaremon
          mkdir -p repo/apt/dists/stable/main/binary-amd64

          cp dist/hardwaremon.deb repo/apt/pool/main/h/hardwaremon/

          cd repo/apt

          dpkg-scanpackages --multiversion pool > dists/stable/main/binary-amd64/Packages
          gzip -k dists/stable/main/binary-amd64/Packages

          # Generate Release file with checksums (required by apt)
          apt-ftparchive release dists/stable > dists/stable/Release

          # Prepend metadata since apt-ftparchive release only does hashes
          cat - dists/stable/Release > dists/stable/Release.tmp <<RELEASE
          Origin: HardwareMon
          Label: HardwareMon
          Suite: stable
          Codename: stable
          Architectures: amd64
          Components: main
          Description: HardwareMon APT Repository
          RELEASE
          mv dists/stable/Release.tmp dists/stable/Release

      - name: Build DNF repo
        run: |
          mkdir -p repo/yum
          cp dist/hardwaremon.rpm repo/yum/
          cd repo/yum
          createrepo_c .

      - name: Prepare Pages output
        run: |
          mkdir -p public/apt public/yum

          cp -r repo/apt/* public/apt/
          cp -r repo/yum/* public/yum/

          echo '<h1>HardwareMon Repo</h1><a href="/apt/">APT</a><br><a href="/yum/">YUM</a>' > public/index.html
          echo "404" > public/404.html

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy public --project-name=hardwaremon --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hardwaremon.deb
            dist/hardwaremon.rpm