name: Build & Publish HardwareMon

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # ─────────────────────────────────────────────
      # Checkout
      # ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # Setup Flutter
      # ─────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ─────────────────────────────────────────────
      # Setup Node.js
      # ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ─────────────────────────────────────────────
      # Install Linux dependencies
      # ─────────────────────────────────────────────
      - name: Install Linux dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            dpkg-dev \
            apt-utils \
            createrepo-c \
            curl \
            golang-go \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            zip \
            python3 \
            python3-pip \
            upx

      # ─────────────────────────────────────────────
      # Install Python dependencies
      # ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python3 -m pip install --break-system-packages \
            flask \
            flask-cors \
            fastapi \
            uvicorn \
            psutil \
            pyinstaller

      # ─────────────────────────────────────────────
      # Install nfpm
      # ─────────────────────────────────────────────
      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      # ─────────────────────────────────────────────
      # Get version
      # ─────────────────────────────────────────────
      - name: Get version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────────
      # Flutter dependencies
      # ─────────────────────────────────────────────
      - name: Flutter pub get
        working-directory: flutter_gui
        run: flutter pub get

      # ─────────────────────────────────────────────
      # Build Flutter Linux app
      # ─────────────────────────────────────────────
      - name: Build Flutter Linux app
        working-directory: flutter_gui
        run: |
          flutter build linux --release \
            --split-debug-info=symbols \
            --dart-define=APP_VERSION="${{ steps.version.outputs.version }}"

      # ─────────────────────────────────────────────
      # Build FastAPI backend
      # ─────────────────────────────────────────────

      - name: Build backend binary
        run: |
          cd hardwaremon

          pyinstaller \
            --onefile \
            --name api \
            --hidden-import flask \
            --hidden-import flask_cors \
            --hidden-import sqlite3 \
            --hidden-import database \
            --hidden-import process_scanner \
            --add-data "database.py:." \
            --add-data "process_scanner.py:." \
            api.py

          strip dist/api || true
          upx --best dist/api



      # ─────────────────────────────────────────────
      # Prepare package structure
      # ─────────────────────────────────────────────
      - name: Prepare package
        run: |
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/lib/hardwaremon
          mkdir -p pkg/usr/lib/hardwaremon/backend
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/icons/hicolor/256x256/apps

          cp -r flutter_gui/build/linux/x64/release/bundle/* \
            pkg/usr/lib/hardwaremon/

          mv pkg/usr/lib/hardwaremon/hardwaremon \
            pkg/usr/lib/hardwaremon/hardwaremon-bin

          cp hardwaremon/dist/api \
            pkg/usr/lib/hardwaremon/backend/

          chmod +x \
            pkg/usr/lib/hardwaremon/backend/api


# ─────────────────────────────────────────────
# Create launcher
# ──────────────────────────────────────────────
      - name: Create launcher
        run: |
          cat <<'EOF' > pkg/usr/bin/hardwaremon
          #!/bin/bash

          APP_DIR="/usr/lib/hardwaremon"

          cd "$APP_DIR"

          # Start backend
          "$APP_DIR/backend/api" &
          BACKEND_PID=$!

          # Launch Flutter app
          "$APP_DIR/hardwaremon-bin"

          # Cleanup backend after app exits
          kill $BACKEND_PID
          EOF
          chmod +x pkg/usr/bin/hardwaremon


      # ─────────────────────────────────────────────
      # Create desktop entry
      # ─────────────────────────────────────────────
      - name: Create desktop entry
        run: |
          cat <<'EOF' > pkg/usr/share/applications/hardwaremon.desktop
          [Desktop Entry]
          Name=HardwareMon
          Comment=Modern system monitoring platform
          Exec=hardwaremon
          Icon=hardwaremon
          Terminal=false
          Type=Application
          Categories=System;Monitor;
          EOF

      # ─────────────────────────────────────────────
      # Copy icon
      # ─────────────────────────────────────────────
      - name: Copy icon
        run: |
          cp hardwaremon/Logo.png \
            pkg/usr/share/icons/hicolor/256x256/apps/hardwaremon.png

      # ─────────────────────────────────────────────
      # Create nfpm config
      # ─────────────────────────────────────────────
      - name: Create nfpm config
        run: |
          cat <<EOF > nfpm.yaml
          name: hardwaremon
          arch: amd64
          platform: linux
          version: "${{ steps.version.outputs.version }}"

          maintainer: Louis Hinchliffe <louishinchliffe11@gmail.com>

          description: Modern cross-platform system monitor

          homepage: https://github.com/louisboii747/HardwareMon

          contents:
            - src: pkg/usr/bin/hardwaremon
              dst: /usr/bin/hardwaremon
              file_info:
                mode: 0755

            - src: pkg/usr/lib/hardwaremon/
              dst: /usr/lib/hardwaremon/
              type: tree

            - src: pkg/usr/share/applications/hardwaremon.desktop
              dst: /usr/share/applications/hardwaremon.desktop

            - src: pkg/usr/share/icons/hicolor/256x256/apps/hardwaremon.png
              dst: /usr/share/icons/hicolor/256x256/apps/hardwaremon.png
          EOF

      # ─────────────────────────────────────────────
      # Build packages
      # ─────────────────────────────────────────────
      - name: Create dist folder
        run: mkdir -p dist

      - name: Build DEB package
        run: |
          nfpm pkg \
            --config nfpm.yaml \
            --packager deb \
            --target dist/hardwaremon.deb

      - name: Build RPM package
        run: |
          nfpm pkg \
            --config nfpm.yaml \
            --packager rpm \
            --target dist/hardwaremon.rpm

      # ─────────────────────────────────────────────
      # Build APT repository
      # ─────────────────────────────────────────────
      - name: Build APT repository
        run: |
          mkdir -p repo/apt/pool/main/h/hardwaremon
          mkdir -p repo/apt/dists/stable/main/binary-amd64

          cp dist/hardwaremon.deb \
            repo/apt/pool/main/h/hardwaremon/

          cd repo/apt

          dpkg-scanpackages --multiversion pool \
            > dists/stable/main/binary-amd64/Packages

          gzip -k dists/stable/main/binary-amd64/Packages

          cat <<EOF > apt.conf
          APT::FTPArchive::Release {
            Origin "HardwareMon";
            Label "HardwareMon";
            Suite "stable";
            Codename "stable";
            Architectures "amd64";
            Components "main";
            Description "HardwareMon APT Repository";
          };
          EOF

          apt-ftparchive -c apt.conf release dists/stable \
            > dists/stable/Release

      # ─────────────────────────────────────────────
      # Build DNF repository
      # ─────────────────────────────────────────────
      - name: Build DNF repository
        run: |
          mkdir -p repo/yum

          cp dist/hardwaremon.rpm repo/yum/

          cd repo/yum

          createrepo_c .

      # ─────────────────────────────────────────────
      # Prepare Cloudflare Pages output
      # ─────────────────────────────────────────────
      - name: Prepare Pages output
        run: |
          mkdir -p public/apt
          mkdir -p public/yum

          cp -r repo/apt/* public/apt/
          cp -r repo/yum/* public/yum/

          # Fedora repo file
          cat <<'EOF' > public/yum/hardwaremon.repo
          [hardwaremon]
          name=HardwareMon Repository
          baseurl=https://hardwaremon.pages.dev/yum/
          enabled=1
          gpgcheck=0
          EOF

          # Homepage
          cat <<'EOF' > public/index.html
          <h1>HardwareMon Repository</h1>

          <a href="/apt/">APT Repository</a>
          <br>
          <a href="/yum/">YUM Repository</a>
          EOF

          echo "404" > public/404.html

      # ─────────────────────────────────────────────
      # Deploy Cloudflare Pages
      # ─────────────────────────────────────────────
      - name: Deploy Cloudflare Pages
        run: |
          npx wrangler pages deploy public \
            --project-name=hardwaremon \
            --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ─────────────────────────────────────────────
      # Create GitHub Release
      # ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

          files: |
            dist/hardwaremon.deb
            dist/hardwaremon.rpm