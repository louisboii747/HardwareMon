name: Publish Python Package

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v3.2.0

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11.7  # Guaranteed to exist on Ubuntu 24.04

      - name: Upgrade pip and install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Extract version from tag
        run: |
          # Strip the leading 'v' from the tag for the version
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Write version to __init__.py
        run: |
          INIT_FILE=hardwaremon/__init__.py
          echo "__version__ = \"${VERSION}\"" > $INIT_FILE
          cat $INIT_FILE  # Show in logs

      - name: Verify Python version
        run: python --version

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*