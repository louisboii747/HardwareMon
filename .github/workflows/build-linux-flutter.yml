name: Build Linux Flutter App

on:
  push:
    tags:
      - 'v*.*.*'

  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            dpkg-dev

      - name: Flutter dependencies
        working-directory: flutter_gui
        run: flutter pub get

      - name: Build Linux release
        working-directory: flutter_gui
        run: flutter build linux --release

      - name: Create package structure
        run: |
          mkdir -p packaging/usr/bin
          mkdir -p packaging/usr/lib/hardwaremon-flutter
          mkdir -p packaging/usr/share/applications
          mkdir -p packaging/usr/share/icons/hicolor/256x256/apps
          mkdir -p packaging/DEBIAN

      - name: Copy Flutter bundle
        run: |
          cp -r flutter_gui/build/linux/x64/release/bundle/* \
            packaging/usr/lib/hardwaremon-flutter/

      - name: Copy backend
        run: |
          mkdir -p packaging/usr/lib/hardwaremon-flutter/backend

          cp hardwaremon/api.py \
            packaging/usr/lib/hardwaremon-flutter/backend/

      - name: Build backend venv
        run: |
          cd packaging/usr/lib/hardwaremon-flutter/backend

          python3 -m venv venv

          source venv/bin/activate

          pip install --upgrade pip

          pip install \
            flask \
            flask-cors \
            psutil \
            gputil \
            py-cpuinfo \
            setuptools

      - name: Create launcher
        run: |
          cat > packaging/usr/bin/hardwaremon-flutter << 'EOF'
          #!/bin/bash

          APP_DIR="/usr/lib/hardwaremon-flutter"
          BACKEND_DIR="$APP_DIR/backend"

          cd "$APP_DIR"

          "$BACKEND_DIR/venv/bin/python" "$BACKEND_DIR/api.py" &

          "$APP_DIR/flutter_gui"
          EOF

          chmod +x packaging/usr/bin/hardwaremon-flutter

      - name: Create desktop entry
        run: |
          cat > packaging/usr/share/applications/hardwaremon-flutter.desktop << 'EOF'
          [Desktop Entry]
          Name=HardwareMon Flutter
          Comment=System monitoring application
          Exec=hardwaremon-flutter
          Icon=hardwaremon-flutter
          Terminal=false
          Type=Application
          Categories=System;Monitor;
          EOF

      - name: Copy icon
        run: |
          cp hardwaremon/cpu.png \
            packaging/usr/share/icons/hicolor/256x256/apps/hardwaremon-flutter.png

      - name: Create control file
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          cat > packaging/DEBIAN/control << EOF
          Package: hardwaremon-flutter
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Louis
          Description: Hardware monitoring application built with Flutter and Python
          EOF

      - name: Build Debian package
        run: |
          mkdir -p dist
          dpkg-deb --build packaging dist/hardwaremon-flutter.deb

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hardwaremon-flutter.deb