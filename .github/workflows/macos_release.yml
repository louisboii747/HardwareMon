name: macOS Release DMG

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

# The tag job may create a GitHub Release and upload its macOS assets.
permissions:
  contents: write

env:
  APP_NAME: HardwareMon
  APP_PATH: hardwaremon_app
  APP_BUNDLE: hardwaremon_app/build/macos/Build/Products/Release/HardwareMon.app
  EXPECTED_BUNDLE_ID: com.hardwaremon.HardwareMon

  # Keep presence checks separate so a failed tag build identifies every
  # missing secret without exposing secret values to logs.
  HAS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE_BASE64 != '' }}
  HAS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD != '' }}
  HAS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD != '' }}
  HAS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY != '' }}
  HAS_APPLE_ID: ${{ secrets.APPLE_ID != '' }}
  HAS_APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
  HAS_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' }}

jobs:
  build-macos-dmg:
    name: Build, sign, notarize, and verify macOS DMG
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "macOS release tags must use vMAJOR.MINOR.PATCH." >&2
              exit 1
            fi
            BUILD_NAME="$VERSION"
            TAG_BUILD=true
          else
            VERSION="dev-${GITHUB_SHA::7}"
            BUILD_NAME="0.0.0"
            TAG_BUILD=false
          fi

          {
            echo "VERSION=$VERSION"
            echo "BUILD_NAME=$BUILD_NAME"
            echo "BUILD_NUMBER=$GITHUB_RUN_NUMBER"
            echo "TAG_BUILD=$TAG_BUILD"
            echo "DMG_NAME=HardwareMon-macOS-$VERSION.dmg"
          } >> "$GITHUB_ENV"

      - name: Select signing and notarization mode
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          [[ "$HAS_CERTIFICATE" == "true" ]] || missing+=(MACOS_CERTIFICATE_BASE64)
          [[ "$HAS_CERTIFICATE_PASSWORD" == "true" ]] || missing+=(MACOS_CERTIFICATE_PASSWORD)
          [[ "$HAS_KEYCHAIN_PASSWORD" == "true" ]] || missing+=(MACOS_KEYCHAIN_PASSWORD)
          [[ "$HAS_SIGNING_IDENTITY" == "true" ]] || missing+=(MACOS_SIGNING_IDENTITY)
          [[ "$HAS_APPLE_ID" == "true" ]] || missing+=(APPLE_ID)
          [[ "$HAS_APPLE_PASSWORD" == "true" ]] || missing+=(APPLE_APP_SPECIFIC_PASSWORD)
          [[ "$HAS_APPLE_TEAM_ID" == "true" ]] || missing+=(APPLE_TEAM_ID)

          if [[ "$TAG_BUILD" == "true" && ${#missing[@]} -ne 0 ]]; then
            echo "Public macOS tag releases must be Developer ID signed and notarized." >&2
            echo "Configure these missing GitHub Actions secrets:" >&2
            printf '  - %s\n' "${missing[@]}" >&2
            echo "Use workflow_dispatch for an ad-hoc developer build without Apple credentials." >&2
            exit 1
          fi

          if [[ "$HAS_CERTIFICATE" == "true" \
                && "$HAS_CERTIFICATE_PASSWORD" == "true" \
                && "$HAS_KEYCHAIN_PASSWORD" == "true" \
                && "$HAS_SIGNING_IDENTITY" == "true" ]]; then
            SIGNED_MODE=true
            RELEASE_MODE=developer-id
          else
            SIGNED_MODE=false
            RELEASE_MODE=unsigned-developer
            echo "::warning::Complete Developer ID secrets are not configured; this manual build will use an ad-hoc signature."
          fi

          if [[ "$SIGNED_MODE" == "true" \
                && "$HAS_APPLE_ID" == "true" \
                && "$HAS_APPLE_PASSWORD" == "true" \
                && "$HAS_APPLE_TEAM_ID" == "true" ]]; then
            NOTARIZE_MODE=true
            RELEASE_MODE=developer-id-notarized
          else
            NOTARIZE_MODE=false
            if [[ "$HAS_APPLE_ID" == "true" \
                  || "$HAS_APPLE_PASSWORD" == "true" \
                  || "$HAS_APPLE_TEAM_ID" == "true" ]]; then
              echo "::warning::Notarization credentials are incomplete or Developer ID signing is unavailable; notarization will be skipped."
            fi
          fi

          {
            echo "SIGNED_MODE=$SIGNED_MODE"
            echo "NOTARIZE_MODE=$NOTARIZE_MODE"
            echo "RELEASE_MODE=$RELEASE_MODE"
          } >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Flutter macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install Flutter dependencies
        working-directory: ${{ env.APP_PATH }}
        run: flutter pub get

      - name: Build Flutter macOS app
        working-directory: ${{ env.APP_PATH }}
        run: >-
          flutter build macos --release
          --build-name "${{ env.BUILD_NAME }}"
          --build-number "${{ env.BUILD_NUMBER }}"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ env.APP_PATH }}/backend_fastapi/requirements.txt

      - name: Install backend build dependencies
        working-directory: ${{ env.APP_PATH }}/backend_fastapi
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build FastAPI macOS helper
        working-directory: ${{ env.APP_PATH }}/backend_fastapi
        run: pyinstaller --clean --noconfirm backend_macos.spec

      - name: Embed backend before final signing
        shell: bash
        run: |
          set -euo pipefail

          HELPERS_DIRECTORY="$APP_BUNDLE/Contents/Helpers"
          BACKEND_APP="$HELPERS_DIRECTORY/HardwareMonBackend.app"
          mkdir -p "$HELPERS_DIRECTORY"
          ditto \
            "$APP_PATH/backend_fastapi/dist/HardwareMonBackend.app" \
            "$BACKEND_APP"

          # Flutter launches this stable entrypoint. It resolves to the
          # PyInstaller executable inside the correctly structured helper app.
          ln -s \
            "HardwareMonBackend.app/Contents/MacOS/backend" \
            "$HELPERS_DIRECTORY/backend"
          chmod +x "$APP_BUNDLE/Contents/Helpers/backend"

      - name: Import Developer ID certificate into temporary keychain
        if: env.SIGNED_MODE == 'true'
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/hardwaremon-signing.keychain-db"
          printf '%s' "$MACOS_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep -F -- "\"$MACOS_SIGNING_IDENTITY\""

      - name: Sign nested code then outer app
        env:
          DEVELOPER_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        shell: bash
        run: |
          set -euo pipefail

          chmod +x .github/scripts/macos-*.sh
          if [[ "$SIGNED_MODE" == "true" ]]; then
            SIGNING_IDENTITY="$DEVELOPER_IDENTITY"
          else
            SIGNING_IDENTITY="-"
          fi

          .github/scripts/macos-sign-app.sh \
            "$APP_BUNDLE" \
            "$SIGNING_IDENTITY" \
            "$APP_PATH/macos/Runner/Release.entitlements"

      - name: Verify final application bundle
        shell: bash
        run: |
          set -euo pipefail
          # Strict codesign checks run now. Gatekeeper becomes mandatory after
          # the notarization ticket is stapled in the following step.
          .github/scripts/macos-validate-app.sh "$APP_BUNDLE" false

      - name: Notarize and staple application
        if: env.NOTARIZE_MODE == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail

          APP_ZIP="$RUNNER_TEMP/HardwareMon-notarization.zip"
          ditto -c -k --keepParent "$APP_BUNDLE" "$APP_ZIP"
          xcrun notarytool submit "$APP_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP_BUNDLE"
          xcrun stapler validate "$APP_BUNDLE"
          codesign --verify --deep --strict --verbose=4 "$APP_BUNDLE"
          spctl --assess --type execute --verbose=4 "$APP_BUNDLE"

      - name: Smoke launch application
        shell: bash
        run: |
          set -euo pipefail

          APP_EXECUTABLE="$APP_BUNDLE/Contents/MacOS/$APP_NAME"
          APP_LOG="$RUNNER_TEMP/hardwaremon-launch.log"
          "$APP_EXECUTABLE" > "$APP_LOG" 2>&1 &
          APP_PID=$!

          sleep 10
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "HardwareMon exited during the launch smoke test." >&2
            cat "$APP_LOG" >&2
            wait "$APP_PID" || true
            exit 1
          fi

          BACKEND_PIDS=$(pgrep -P "$APP_PID" || true)
          if [[ -n "$BACKEND_PIDS" ]]; then
            kill $BACKEND_PIDS 2>/dev/null || true
          fi
          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" || true

      - name: Stage immutable app for DMG
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          rm -rf dist/dmg
          mkdir -p dist/dmg
          ditto "$APP_BUNDLE" "dist/dmg/$APP_NAME.app"
          ln -s /Applications dist/dmg/Applications

          if [[ "$SIGNED_MODE" != "true" ]]; then
            cp "$APP_PATH/macos/README.md" dist/dmg/UNSIGNED-DEVELOPER-BUILD.md
          fi

          # Re-verify the copied app. No files inside it are changed after this.
          .github/scripts/macos-validate-app.sh \
            "dist/dmg/$APP_NAME.app" \
            "$NOTARIZE_MODE"

      - name: Create compressed DMG
        shell: bash
        run: |
          set -euo pipefail
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder dist/dmg \
            -ov \
            -format UDZO \
            "dist/$DMG_NAME"

      - name: Sign DMG
        if: env.SIGNED_MODE == 'true'
        run: |
          codesign --force --timestamp \
            --sign "${{ secrets.MACOS_SIGNING_IDENTITY }}" \
            "dist/$DMG_NAME"
          codesign --verify --strict --verbose=4 "dist/$DMG_NAME"

      - name: Notarize and staple DMG
        if: env.NOTARIZE_MODE == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail
          xcrun notarytool submit "dist/$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "dist/$DMG_NAME"
          xcrun stapler validate "dist/$DMG_NAME"

      - name: Verify final DMG and mounted app
        shell: bash
        run: |
          set -euo pipefail
          .github/scripts/macos-validate-dmg.sh "dist/$DMG_NAME" "$NOTARIZE_MODE"

      - name: Generate SHA-256 checksum
        working-directory: dist
        run: shasum -a 256 "$DMG_NAME" > "$DMG_NAME.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: HardwareMon-macOS-${{ env.RELEASE_MODE }}
          path: |
            dist/${{ env.DMG_NAME }}
            dist/${{ env.DMG_NAME }}.sha256
          if-no-files-found: error

      - name: Create or update matching GitHub Release
        if: env.TAG_BUILD == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --title "HardwareMon $GITHUB_REF_NAME" \
              --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" \
            "dist/$DMG_NAME" \
            "dist/$DMG_NAME.sha256" \
            --clobber

      - name: Remove temporary signing keychain
        if: always() && env.SIGNED_MODE == 'true'
        shell: bash
        run: security delete-keychain "$RUNNER_TEMP/hardwaremon-signing.keychain-db" || true
