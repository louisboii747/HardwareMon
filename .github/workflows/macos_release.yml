name: macOS Release DMG

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

# The tag job may create a GitHub Release and upload its macOS assets.
permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

env:
  APP_NAME: HardwareMon
  APP_PATH: hardwaremon_app
  APP_BUNDLE: hardwaremon_app/build/macos/Build/Products/Release/HardwareMon.app
  EXPECTED_BUNDLE_ID: com.hardwaremon.HardwareMon

jobs:
  build-macos-dmg:
    name: Build, ad-hoc sign, and verify macOS DMG
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "macOS release tags must use vMAJOR.MINOR.PATCH." >&2
              exit 1
            fi
            BUILD_NAME="$VERSION"
            TAG_BUILD=true
          else
            VERSION="dev-${GITHUB_SHA::7}"
            BUILD_NAME="0.0.0"
            TAG_BUILD=false
          fi

          {
            echo "VERSION=$VERSION"
            echo "BUILD_NAME=$BUILD_NAME"
            echo "BUILD_NUMBER=$GITHUB_RUN_NUMBER"
            echo "TAG_BUILD=$TAG_BUILD"
            echo "DMG_NAME=HardwareMon-macOS-$VERSION.dmg"
          } >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Flutter macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install Flutter dependencies
        working-directory: ${{ env.APP_PATH }}
        run: flutter pub get

      - name: Build Flutter macOS app
        working-directory: ${{ env.APP_PATH }}
        run: >-
          flutter build macos --release
          --build-name "${{ env.BUILD_NAME }}"
          --build-number "${{ env.BUILD_NUMBER }}"

      - name: Locate built macOS application
        shell: bash
        run: |
          set -euo pipefail

          PREFERRED_APP_BUNDLE="$APP_PATH/build/macos/Build/Products/Release/$APP_NAME.app"
          echo "Expecting the Flutter release app at: $PREFERRED_APP_BUNDLE"
          if [[ ! -d "$PREFERRED_APP_BUNDLE" ]]; then
            echo "::error::Flutter macOS build completed without creating the expected app bundle: $PREFERRED_APP_BUNDLE" >&2
            exit 1
          fi

          echo "Found macOS application bundle: $PREFERRED_APP_BUNDLE"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ env.APP_PATH }}/backend_fastapi/requirements.txt

      - name: Install backend build dependencies
        working-directory: ${{ env.APP_PATH }}/backend_fastapi
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Test macOS hardware parsing and unavailable telemetry
        working-directory: ${{ env.APP_PATH }}/backend_fastapi
        run: python -m unittest tests.test_macos_hardware -v

      - name: Build FastAPI macOS helper
        working-directory: ${{ env.APP_PATH }}/backend_fastapi
        run: pyinstaller --clean --noconfirm backend_macos.spec

      - name: Embed backend before final signing
        shell: bash
        run: |
          set -euo pipefail

          HELPERS_DIRECTORY="$APP_BUNDLE/Contents/Helpers"
          BACKEND_APP="$HELPERS_DIRECTORY/HardwareMonBackend.app"
          mkdir -p "$HELPERS_DIRECTORY"
          ditto \
            "$APP_PATH/backend_fastapi/dist/HardwareMonBackend.app" \
            "$BACKEND_APP"

          # Flutter launches this stable entrypoint. It resolves to the
          # PyInstaller executable inside the correctly structured helper app.
          ln -s \
            "HardwareMonBackend.app/Contents/MacOS/backend" \
            "$HELPERS_DIRECTORY/backend"
          chmod +x "$APP_BUNDLE/Contents/Helpers/backend"

      - name: Ad-hoc sign complete application bundle
        shell: bash
        run: |
          set -euo pipefail

          PREFERRED_APP_BUNDLE="$APP_PATH/build/macos/Build/Products/Release/$APP_NAME.app"
          if [[ ! -d "$PREFERRED_APP_BUNDLE" ]]; then
            echo "::error::Cannot sign missing app bundle: $PREFERRED_APP_BUNDLE" >&2
            exit 1
          fi

          chmod +x .github/scripts/macos-*.sh
          xattr -cr "$PREFERRED_APP_BUNDLE"

          echo "Ad-hoc signing the complete app bundle, including embedded frameworks and helpers:"
          echo "  $PREFERRED_APP_BUNDLE"
          codesign --force --deep --sign - "$PREFERRED_APP_BUNDLE"

          echo "Strictly verifying the final ad-hoc signature before DMG creation:"
          codesign --verify --deep --strict --verbose=2 "$PREFERRED_APP_BUNDLE"

      - name: Verify final application bundle
        shell: bash
        run: |
          set -euo pipefail
          .github/scripts/macos-validate-app.sh "$APP_BUNDLE" false

      - name: Smoke launch application
        shell: bash
        run: |
          set -euo pipefail

          APP_EXECUTABLE="$APP_BUNDLE/Contents/MacOS/$APP_NAME"
          APP_LOG="$RUNNER_TEMP/hardwaremon-launch.log"
          "$APP_EXECUTABLE" > "$APP_LOG" 2>&1 &
          APP_PID=$!

          sleep 10
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "HardwareMon exited during the launch smoke test." >&2
            cat "$APP_LOG" >&2
            wait "$APP_PID" || true
            exit 1
          fi

          BACKEND_PIDS=$(pgrep -P "$APP_PID" || true)
          if [[ -n "$BACKEND_PIDS" ]]; then
            kill $BACKEND_PIDS 2>/dev/null || true
          fi
          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" || true

      - name: Stage immutable app for DMG
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          rm -rf dist/dmg
          mkdir -p dist/dmg
          ditto "$APP_BUNDLE" "dist/dmg/$APP_NAME.app"
          ln -s /Applications dist/dmg/Applications

          cp "$APP_PATH/macos/README.md" dist/dmg/AD-HOC-SIGNED-BUILD.md

          # Re-verify the copied app. No files inside it are changed after this.
          .github/scripts/macos-validate-app.sh \
            "dist/dmg/$APP_NAME.app" \
            false

      - name: Create compressed DMG
        shell: bash
        run: |
          set -euo pipefail
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder dist/dmg \
            -ov \
            -format UDZO \
            "dist/$DMG_NAME"

      - name: Verify final DMG and mounted app
        shell: bash
        run: |
          set -euo pipefail
          .github/scripts/macos-validate-dmg.sh "dist/$DMG_NAME" false

      - name: Generate SHA-256 checksum
        working-directory: dist
        run: shasum -a 256 "$DMG_NAME" > "$DMG_NAME.sha256"

      - name: Generate macOS release metadata and CycloneDX SBOM
        run: |
          python .github/scripts/generate-release-metadata.py \
            --output-dir dist \
            --checksums-name SHA256SUMS-macos.txt \
            --metadata-name release-metadata-macos.json \
            "dist/$DMG_NAME"
          python .github/scripts/generate-release-sbom.py \
            --output "dist/HardwareMon-macOS-$VERSION.cdx.json" \
            --version "$VERSION" \
            --artifact "$DMG_NAME"

      - name: Attest macOS DMG provenance
        uses: actions/attest@v4
        with:
          subject-path: dist/${{ env.DMG_NAME }}

      - name: Attest macOS DMG SBOM
        uses: actions/attest@v4
        with:
          subject-path: dist/${{ env.DMG_NAME }}
          sbom-path: dist/HardwareMon-macOS-${{ env.VERSION }}.cdx.json

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: HardwareMon-macOS-ad-hoc-signed
          path: |
            dist/${{ env.DMG_NAME }}
            dist/${{ env.DMG_NAME }}.sha256
            dist/SHA256SUMS-macos.txt
            dist/release-metadata-macos.json
            dist/HardwareMon-macOS-${{ env.VERSION }}.cdx.json
          if-no-files-found: error

      - name: Create or update matching GitHub Release
        if: env.TAG_BUILD == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --title "HardwareMon $GITHUB_REF_NAME" \
              --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" \
            "dist/$DMG_NAME" \
            "dist/$DMG_NAME.sha256" \
            "dist/SHA256SUMS-macos.txt" \
            "dist/release-metadata-macos.json" \
            "dist/HardwareMon-macOS-$VERSION.cdx.json" \
            --clobber
