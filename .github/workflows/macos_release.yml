name: macOS Release DMG

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  APP_NAME: HardwareMon
  FLUTTER_VERSION: "stable"
  APP_PATH: hardwaremon_app
  APP_BUNDLE: hardwaremon_app/build/macos/Build/Products/Release/HardwareMon.app
  EXPECTED_BUNDLE_ID: com.hardwaremon.HardwareMon
  HAS_ANY_MACOS_SIGNING: ${{ secrets.MACOS_CERTIFICATE_BASE64 != '' || secrets.MACOS_CERTIFICATE_PASSWORD != '' || secrets.MACOS_KEYCHAIN_PASSWORD != '' || secrets.MACOS_SIGNING_IDENTITY != '' }}
  HAS_MACOS_SIGNING: ${{ secrets.MACOS_CERTIFICATE_BASE64 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && secrets.MACOS_KEYCHAIN_PASSWORD != '' && secrets.MACOS_SIGNING_IDENTITY != '' }}
  HAS_ANY_MACOS_NOTARIZATION: ${{ secrets.APPLE_ID != '' || secrets.APPLE_APP_SPECIFIC_PASSWORD != '' || secrets.APPLE_TEAM_ID != '' }}
  HAS_MACOS_NOTARIZATION: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}

jobs:
  build-macos-dmg:
    name: Build and validate macOS DMG
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set release version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "macOS tag versions must use vMAJOR.MINOR.PATCH." >&2
              exit 1
            fi
            BUILD_NAME="$VERSION"
          else
            VERSION="dev-${GITHUB_SHA::7}"
            BUILD_NAME="0.0.0"
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NAME=$BUILD_NAME" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"
          echo "DMG_NAME=HardwareMon-macOS-$VERSION.dmg" >> "$GITHUB_ENV"

      - name: Select release credential mode
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$HAS_MACOS_SIGNING" == "true" && "$HAS_MACOS_NOTARIZATION" == "true" ]]; then
            echo "RELEASE_MODE=signed" >> "$GITHUB_ENV"
            echo "SIGNED_MODE=true" >> "$GITHUB_ENV"
          else
            echo "RELEASE_MODE=unsigned-developer" >> "$GITHUB_ENV"
            echo "SIGNED_MODE=false" >> "$GITHUB_ENV"
            echo "::warning::Apple Developer ID signing/notarization is not fully configured. Continuing with an ad-hoc-signed macOS build."

            if [[ "$HAS_ANY_MACOS_SIGNING" == "true" && "$HAS_MACOS_SIGNING" != "true" ]]; then
              echo "::warning::Some macOS signing secrets are present, but the set is incomplete; paid signing will be skipped."
            fi
            if [[ "$HAS_ANY_MACOS_NOTARIZATION" == "true" && "$HAS_MACOS_NOTARIZATION" != "true" ]]; then
              echo "::warning::Some macOS notarization secrets are present, but the set is incomplete; notarization will be skipped."
            fi
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Flutter pub get
        working-directory: ${{ env.APP_PATH }}
        run: flutter pub get

      - name: Build macOS app
        working-directory: ${{ env.APP_PATH }}
        run: >-
          flutter build macos --release
          --build-name "${{ env.BUILD_NAME }}"
          --build-number "${{ env.BUILD_NUMBER }}"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: ${{ env.APP_PATH }}/backend_fastapi
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS backend
        working-directory: ${{ env.APP_PATH }}/backend_fastapi
        run: pyinstaller --clean --noconfirm backend_macos.spec

      - name: Bundle backend into macOS app
        shell: bash
        run: |
          set -euo pipefail
          HELPERS_DIRECTORY="${{ env.APP_BUNDLE }}/Contents/Helpers"
          BACKEND_DESTINATION="$HELPERS_DIRECTORY/HardwareMonBackend.app"
          mkdir -p "$HELPERS_DIRECTORY"
          ditto \
            "${{ env.APP_PATH }}/backend_fastapi/dist/HardwareMonBackend.app" \
            "$BACKEND_DESTINATION"
          chmod 755 "$BACKEND_DESTINATION/Contents/MacOS/backend"

      - name: Import Developer ID certificate
        if: env.SIGNED_MODE == 'true'
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$MACOS_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Sign app bundle inside-out
        env:
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$SIGNED_MODE" == "true" ]]; then
            IDENTITY="$SIGNING_IDENTITY"
          else
            IDENTITY="-"
          fi
          chmod +x .github/scripts/macos-*.sh
          .github/scripts/macos-sign-app.sh \
            "${{ env.APP_BUNDLE }}" \
            "$IDENTITY" \
            "${{ env.APP_PATH }}/macos/Runner/Release.entitlements"

      - name: Validate signed app bundle
        shell: bash
        run: |
          set -euo pipefail
          .github/scripts/macos-validate-app.sh \
            "${{ env.APP_BUNDLE }}" \
            "$SIGNED_MODE"

      - name: Notarize and staple app bundle
        if: env.SIGNED_MODE == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail
          APP_ZIP="$RUNNER_TEMP/HardwareMon-notarization.zip"
          ditto -c -k --keepParent "${{ env.APP_BUNDLE }}" "$APP_ZIP"
          xcrun notarytool submit "$APP_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "${{ env.APP_BUNDLE }}"
          xcrun stapler validate "${{ env.APP_BUNDLE }}"
          codesign --verify --deep --strict --verbose=4 "${{ env.APP_BUNDLE }}"
          spctl --assess --type execute --verbose=4 "${{ env.APP_BUNDLE }}"

      - name: Smoke launch application
        shell: bash
        run: |
          set -euo pipefail
          APP_EXECUTABLE="${{ env.APP_BUNDLE }}/Contents/MacOS/${{ env.APP_NAME }}"
          APP_LOG="$RUNNER_TEMP/hardwaremon-launch.log"

          "$APP_EXECUTABLE" > "$APP_LOG" 2>&1 &
          APP_PID=$!
          sleep 10
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "HardwareMon exited during the launch smoke test." >&2
            cat "$APP_LOG" >&2
            wait "$APP_PID" || true
            exit 1
          fi

          BACKEND_PIDS=$(pgrep -P "$APP_PID" || true)
          if [[ -n "$BACKEND_PIDS" ]]; then
            kill $BACKEND_PIDS 2>/dev/null || true
          fi
          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" || true

      - name: Create DMG staging folder
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist/dmg
          mkdir -p dist/dmg
          ditto "${{ env.APP_BUNDLE }}" "dist/dmg/${{ env.APP_NAME }}.app"
          ln -s /Applications dist/dmg/Applications
          if [[ "$SIGNED_MODE" != "true" ]]; then
            cp "${{ env.APP_PATH }}/macos/README.md" dist/dmg/UNSIGNED-DEVELOPER-BUILD.md
          fi
          .github/scripts/macos-validate-app.sh \
            "dist/dmg/${{ env.APP_NAME }}.app" \
            "$SIGNED_MODE"

      - name: Create DMG
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          hdiutil create \
            -volname "${{ env.APP_NAME }}" \
            -srcfolder dist/dmg \
            -ov \
            -format UDZO \
            "dist/${{ env.DMG_NAME }}"

      - name: Sign DMG
        if: env.SIGNED_MODE == 'true'
        shell: bash
        run: |
          set -euo pipefail
          codesign --force --timestamp \
            --sign "${{ secrets.MACOS_SIGNING_IDENTITY }}" \
            "dist/${{ env.DMG_NAME }}"
          codesign --verify --strict --verbose=4 "dist/${{ env.DMG_NAME }}"

      - name: Notarize and staple DMG
        if: env.SIGNED_MODE == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail
          xcrun notarytool submit "dist/${{ env.DMG_NAME }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "dist/${{ env.DMG_NAME }}"
          xcrun stapler validate "dist/${{ env.DMG_NAME }}"

      - name: Validate final DMG and mounted app
        shell: bash
        run: |
          set -euo pipefail
          .github/scripts/macos-validate-dmg.sh \
            "dist/${{ env.DMG_NAME }}" \
            "$SIGNED_MODE"

      - name: Generate checksum
        working-directory: dist
        run: shasum -a 256 "${{ env.DMG_NAME }}" > "${{ env.DMG_NAME }}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: HardwareMon-macOS-${{ env.RELEASE_MODE }}
          path: |
            dist/*.dmg
            dist/*.sha256

      - name: Upload DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.dmg
            dist/*.sha256

      - name: Remove temporary signing keychain
        if: always() && env.SIGNED_MODE == 'true'
        shell: bash
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
