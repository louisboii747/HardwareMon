name: Windows Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    env:
      APP_VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ─────────────────────────────────────
      # Flutter
      # ─────────────────────────────────────

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: |
          cd hardwaremon_app
          flutter pub get

      # ─────────────────────────────────────
      # Python backend
      # ─────────────────────────────────────

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          cd hardwaremon_app/backend_fastapi
          pip install -r requirements.txt
          pip install pyinstaller requests

      - name: Build backend executable
        run: |
          cd hardwaremon_app/backend_fastapi
          pyinstaller backend.spec

      # ─────────────────────────────────────
      # Inno Setup
      # ─────────────────────────────────────

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      # ─────────────────────────────────────
      # Build installer
      # ─────────────────────────────────────

      - name: Build installer
        shell: pwsh
        run: |
          cd installer
          ./build_installer.ps1

      - name: Generate Windows checksums and release metadata
        shell: pwsh
        run: |
          python .github/scripts/generate-release-metadata.py `
            --output-dir installer/Output `
            --checksums-name SHA256SUMS-windows.txt `
            --metadata-name release-metadata-windows.json `
            "installer/Output/*.exe"

      - name: Generate Windows CycloneDX SBOM
        shell: pwsh
        run: |
          python .github/scripts/generate-release-sbom.py `
            --output installer/Output/HardwareMon-Windows-${{ github.ref_name }}.cdx.json `
            --version "${{ github.ref_name }}" `
            --artifact "Windows installer"

      - name: Attest Windows installer provenance
        uses: actions/attest@v4
        with:
          subject-path: installer/Output/*.exe

      - name: Attest Windows installer SBOM
        uses: actions/attest@v4
        with:
          subject-path: installer/Output/*.exe
          sbom-path: installer/Output/HardwareMon-Windows-${{ github.ref_name }}.cdx.json

      - name: Upload Windows release evidence
        uses: actions/upload-artifact@v7
        with:
          name: HardwareMon-Windows-${{ github.ref_name }}-release-evidence
          path: |
            installer/Output/*.exe
            installer/Output/SHA256SUMS-windows.txt
            installer/Output/release-metadata-windows.json
            installer/Output/HardwareMon-Windows-${{ github.ref_name }}.cdx.json
          if-no-files-found: error

      # ─────────────────────────────────────
      # GitHub Release
      # ─────────────────────────────────────

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            installer/Output/*.exe
            installer/Output/SHA256SUMS-windows.txt
            installer/Output/release-metadata-windows.json
            installer/Output/HardwareMon-Windows-${{ github.ref_name }}.cdx.json

  # ─────────────────────────────────────────
  # Winget
  # ─────────────────────────────────────────

  winget:
    needs:
      - build-windows

    runs-on: ubuntu-latest

    steps:
      - name: Submit package to winget
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: LouisHinchliffe.HardwareMon
          installers-regex: 'HardwareMon-.*\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
