name: Build Flatpak

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:

jobs:
  build-flatpak:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # ─────────────────────────────────────────────
      # Checkout
      # ─────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # Flutter
      # ─────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ─────────────────────────────────────────────
      # Install dependencies
      # ─────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            flatpak \
            flatpak-builder \
            python3-pip \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev

      # ─────────────────────────────────────────────
      # Install Flatpak runtimes
      # ─────────────────────────────────────────────
      - name: Install Flatpak runtimes
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

          flatpak install -y flathub org.freedesktop.Platform//24.08
          flatpak install -y flathub org.freedesktop.Sdk//24.08

      # ─────────────────────────────────────────────
      # Flutter dependencies
      # ─────────────────────────────────────────────
      - name: Install Flutter dependencies
        working-directory: flutter_gui
        run: flutter pub get

      # ─────────────────────────────────────────────
      # Build Flutter Linux app
      # ─────────────────────────────────────────────
      - name: Build Flutter Linux app
        working-directory: flutter_gui
        run: |
          flutter build linux --release

      # ─────────────────────────────────────────────
      # Prepare backend
      # ─────────────────────────────────────────────
      - name: Prepare backend
        run: |
          mkdir -p flutter_gui/build/linux/x64/release/bundle/backend

          cp hardwaremon/api.py \
            flutter_gui/build/linux/x64/release/bundle/backend/

          cp hardwaremon/database.py \
            flutter_gui/build/linux/x64/release/bundle/backend/

      # ─────────────────────────────────────────────
      # Download Python dependencies
      # ─────────────────────────────────────────────
      - name: Download Python dependencies
        run: |
          mkdir -p python-packages

          pip download \
            psutil \
            flask \
            flask-cors \
            GPUtil \
            setuptools \
            wheel \
            -d python-packages

      # ─────────────────────────────────────────────
      # Build Flatpak
      # ─────────────────────────────────────────────
      - name: Build Flatpak
        run: |
          flatpak-builder build-dir \
            flatpak/com.hardwaremon.HardwareMon.yml \
            --force-clean

      # ─────────────────────────────────────────────
      # Export Flatpak repo
      # ─────────────────────────────────────────────
      - name: Export Flatpak repo
        run: |
          flatpak build-export repo build-dir

      # ─────────────────────────────────────────────
      # Create Flatpak bundle
      # ─────────────────────────────────────────────
      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle repo \
            hardwaremon.flatpak \
            com.hardwaremon.HardwareMon

      # ─────────────────────────────────────────────
      # Upload artifact
      # ─────────────────────────────────────────────
      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: hardwaremon-flatpak
          path: hardwaremon.flatpak

      # ─────────────────────────────────────────────
      # Upload to GitHub Release
      # ─────────────────────────────────────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: hardwaremon.flatpak