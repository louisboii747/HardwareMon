name: Build Flatpak

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:

jobs:
  build-flatpak:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            flatpak \
            flatpak-builder \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libkeybinder-3.0-dev \
            libnotify-dev \
            libayatana-appindicator3-dev \
            liblzma-dev \
            python3-pip \
            python3-venv

      - name: Install Flatpak runtimes
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo

          flatpak install --user -y \
            flathub org.freedesktop.Platform//24.08

          flatpak install --user -y \
            flathub org.freedesktop.Sdk//24.08

      - name: Flutter pub get
        working-directory: hardwaremon_app
        run: flutter pub get

      - name: Resolve build metadata
        id: version
        working-directory: hardwaremon_app
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="$(awk '/^version:/ {print $2; exit}' pubspec.yaml)"
            VERSION="${VERSION%%+*}"
          fi
          FLUTTER_VERSION="$(flutter --version --machine | jq -r '.frameworkVersion')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "flutter_version=$FLUTTER_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Flutter Linux app
        working-directory: hardwaremon_app
        run: |
          flutter build linux --release \
            --build-name="${{ steps.version.outputs.version }}" \
            --dart-define=APP_VERSION="${{ steps.version.outputs.version }}" \
            --dart-define=HARDWAREMON_FLUTTER_VERSION="${{ steps.version.outputs.flutter_version }}"

          mkdir -p build/linux/x64/release/bundle/runtime-libs

          ldd \
            build/linux/x64/release/bundle/lib/libtray_manager_plugin.so \
            build/linux/x64/release/bundle/lib/libhotkey_manager_linux_plugin.so \
            | awk '/ayatana|dbusmenu|keybinder/ && $3 ~ /^\// {print $3}' \
            | sort -u \
            | while read -r library; do
                cp -L "$library" build/linux/x64/release/bundle/runtime-libs/
              done

      - name: Install backend dependencies
        working-directory: hardwaremon_app/backend_fastapi
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend executable
        working-directory: hardwaremon_app/backend_fastapi
        run: |
          pyinstaller backend.spec

      - name: Copy backend into bundle
        run: |
          mkdir -p hardwaremon_app/build/linux/x64/release/bundle/backend

          cp -a \
            hardwaremon_app/backend_fastapi/dist/backend/. \
            hardwaremon_app/build/linux/x64/release/bundle/backend/

          chmod +x \
            hardwaremon_app/build/linux/x64/release/bundle/backend/backend

      - name: Build Flatpak
        run: |
          flatpak-builder build-dir \
            flatpak/com.hardwaremon.HardwareMon.yml \
            --force-clean

      - name: Export Flatpak repository
        run: |
          flatpak build-export repo build-dir

      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle \
            repo \
            hardwaremon.flatpak \
            com.hardwaremon.HardwareMon

      - name: Generate Flatpak checksums and release metadata
        run: |
          python .github/scripts/generate-release-metadata.py \
            --output-dir dist/flatpak \
            --checksums-name SHA256SUMS-flatpak.txt \
            --metadata-name release-metadata-flatpak.json \
            hardwaremon.flatpak
          python .github/scripts/generate-release-sbom.py \
            --output "dist/flatpak/HardwareMon-Flatpak-${{ steps.version.outputs.version }}.cdx.json" \
            --version "${{ steps.version.outputs.version }}" \
            --artifact "hardwaremon.flatpak"

      - name: Attest Flatpak provenance
        uses: actions/attest@v4
        with:
          subject-path: hardwaremon.flatpak

      - name: Attest Flatpak SBOM
        uses: actions/attest@v4
        with:
          subject-path: hardwaremon.flatpak
          sbom-path: dist/flatpak/HardwareMon-Flatpak-${{ steps.version.outputs.version }}.cdx.json

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: hardwaremon-flatpak
          path: |
            hardwaremon.flatpak
            dist/flatpak/SHA256SUMS-flatpak.txt
            dist/flatpak/release-metadata-flatpak.json
            dist/flatpak/HardwareMon-Flatpak-${{ steps.version.outputs.version }}.cdx.json
          if-no-files-found: error

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          files: |
            hardwaremon.flatpak
            dist/flatpak/SHA256SUMS-flatpak.txt
            dist/flatpak/release-metadata-flatpak.json
            dist/flatpak/HardwareMon-Flatpak-${{ steps.version.outputs.version }}.cdx.json
