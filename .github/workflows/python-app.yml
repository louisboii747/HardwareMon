name: HardwareMon Full Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-packages:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install FPM
      run: |
        sudo apt-get update
        sudo apt-get install -y ruby ruby-dev build-essential
        sudo gem install fpm

    # -------------------------
    # DEB PACKAGE (FIXED)
    # -------------------------
    - name: Build DEB
      run: |
        fpm -s dir -t deb \
          -n hardwaremon \
          -v 2.0.4 \
          --prefix=/usr/local \
          hardwaremon/=usr/local/share/hardwaremon/ \
          hardwaremon/hardwaremon.py=/usr/local/bin/hardwaremon \
          hardwaremon/hardwaremon_gui.py=/usr/local/bin/hardwaremon-gui

    # -------------------------
    # RPM PACKAGE (FIXED)
    # -------------------------
    - name: Build RPM
      run: |
        fpm -s dir -t rpm \
          -n hardwaremon \
          -v 2.0.4 \
          --prefix=/usr/local \
          hardwaremon/=usr/local/share/hardwaremon/ \
          hardwaremon/hardwaremon.py=/usr/local/bin/hardwaremon \
          hardwaremon/hardwaremon_gui.py=/usr/local/bin/hardwaremon-gui

    # -------------------------
    # UPLOAD TO NEXUS (APT)
    # -------------------------
    - name: Upload DEB to Nexus
      run: |
        curl -f --retry 3 --retry-delay 5 \
          -u "${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }}" \
          --upload-file *.deb \
          https://nexus.hardwaremon.online/repository/hardwaremon-apt/

    # -------------------------
    # UPLOAD TO NEXUS (YUM)
    # -------------------------
    - name: Upload RPM to Nexus
      run: |
        curl -f --retry 3 --retry-delay 5 \
          -u "${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }}" \
          --upload-file *.rpm \
          https://nexus.hardwaremon.online/repository/hardwaremon-yum/