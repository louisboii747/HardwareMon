name: Android Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to package (for example, v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  package-android:
    name: Test, sign, and package Android
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must use a version such as v1.2.3."
            exit 1
          fi
          echo "ANDROID_VERSION_NAME=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - name: Validate Android signing secrets
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "$SIGNING_KEY" || -z "$KEY_ALIAS" || -z "$STORE_PASSWORD" || -z "$KEY_PASSWORD" ]]; then
            echo "Android signing secrets are not fully configured."
            exit 1
          fi

      - name: Test, lint, and build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean testDebugUnitTest lintRelease assembleRelease \
            -PhardwaremonVersionName="$ANDROID_VERSION_NAME" \
            -PhardwaremonVersionCode="$GITHUB_RUN_NUMBER"

      - name: Sign and verify APK
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/hardwaremon-release.jks"
          OUTPUT_DIR="android/release"
          OUTPUT_APK="$OUTPUT_DIR/HardwareMon-Android-${RELEASE_TAG}.apk"
          BUILD_TOOLS_VERSION="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -V | tail -n 1)"
          APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner"

          printf '%s' "$SIGNING_KEY" | base64 --decode > "$KEYSTORE_PATH"
          mkdir -p "$OUTPUT_DIR"

          "$APKSIGNER" sign \
            --ks "$KEYSTORE_PATH" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass env:STORE_PASSWORD \
            --key-pass env:KEY_PASSWORD \
            --out "$OUTPUT_APK" \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

          "$APKSIGNER" verify --verbose --print-certs "$OUTPUT_APK"
          sha256sum "$OUTPUT_APK" > "$OUTPUT_APK.sha256"
          rm -f "$KEYSTORE_PATH"

      - name: Upload packaged APK to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: HardwareMon-Android-${{ env.RELEASE_TAG }}
          path: |
            android/release/HardwareMon-Android-${{ env.RELEASE_TAG }}.apk
            android/release/HardwareMon-Android-${{ env.RELEASE_TAG }}.apk.sha256
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            android/release/HardwareMon-Android-${{ env.RELEASE_TAG }}.apk
            android/release/HardwareMon-Android-${{ env.RELEASE_TAG }}.apk.sha256
