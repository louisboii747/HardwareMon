name: Android Companion Release

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and upload (for example, v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # setup-gradle configures Gradle and caches wrapper/dependency data.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Test and build debug APK
        working-directory: android
        run: ./gradlew testDebugUnitTest assembleDebug

      - name: Prepare release asset
        run: |
          mkdir -p android/release
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            "android/release/HardwareMon-Companion-Android-debug-${RELEASE_TAG}.apk"

      # TODO: Replace the debug artifact with signed release APK/AAB outputs once
      # Android keystore credentials are stored as GitHub Actions secrets.
      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: android/release/HardwareMon-Companion-Android-debug-${{ env.RELEASE_TAG }}.apk
