app-id: com.hardwaremon.HardwareMon
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: hardwaremon

finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --device=all
  - --filesystem=host
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: hardwaremon
    buildsystem: simple

    build-commands:
      - mkdir -p /app/bin

      - cp -r . /app/bin/

      - chmod +x /app/bin/hardwaremon

      # PyInstaller backend executable
      - chmod +x /app/bin/backend/backend || true

      - install -Dm644 assets/com.hardwaremon.HardwareMon.desktop /app/share/applications/com.hardwaremon.HardwareMon.desktop

      - install -Dm644 assets/com.hardwaremon.HardwareMon.png /app/share/icons/hicolor/256x256/apps/com.hardwaremon.HardwareMon.png

    sources:
      - type: dir
        path: ../flutter_gui/build/linux/x64/release/bundle

      - type: dir
        path: assets
        dest: assets
