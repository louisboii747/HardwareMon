name: hardwaremon
arch: amd64
platform: linux
version: ${VERSION}
section: utils
priority: optional

maintainer: Louis
description: Hardware monitoring tool (CLI + GUI)
license: MIT

contents:
  - src: hardwaremon/
    dst: /opt/hardwaremon/

  - src: pyproject.toml
    dst: /opt/hardwaremon/pyproject.toml

  - src: pkg/bin/hardwaremon
    dst: /usr/bin/hardwaremon
    file_info:
      mode: 0755

  - src: pkg/bin/hardwaremon-gui
    dst: /usr/bin/hardwaremon-gui
    file_info:
      mode: 0755