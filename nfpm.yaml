name: hardwaremon
arch: amd64
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: "Louis Hinchliffe <louishinchliffe11@gmail.com>"
description: "A hardware monitoring tool written in Python."
license: MIT
dependencies:
  - python3
  - python3-psutil
  - python3-pil.imagetk

contents:
  - src: ./pkg/hardwaremon/
    dst: /opt/hardwaremon/

  - src: ./pkg/bin/hardwaremon
    dst: /usr/bin/hardwaremon
    file_info:
      mode: 0755

  - src: ./pkg/bin/hardwaremon-gui
    dst: /usr/bin/hardwaremon-gui  
    file_info:
      mode: 0755